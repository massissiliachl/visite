<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VisitBéjaïa | Hébergements d'exception</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f2b3d;
            --primary-dark: #0a1f2c;
            --accent: #e07a5f;
            --accent-light: #f4a261;
            --accent-glow: #e76f51;
            --light: #fdfaf6;
            --dark: #1e2c2f;
            --gray: #6b7b7c;
            --glass-bg: rgba(253, 250, 246, 0.92);
            --shadow-sm: 0 10px 30px -12px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 30px 50px -15px rgba(0, 0, 0, 0.2);
            --transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--light);
            color: var(--dark);
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
        }

        h1, h2, h3, h4, .logo-text {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .fade-up {
            animation: fadeUp 0.8s ease forwards;
        }

        /* Section styles */
        .section-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .section-tag {
            display: inline-block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 1rem;
            background: rgba(224, 122, 95, 0.1);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
        }

        .section-title {
            font-size: clamp(2rem, 5vw, 3.5rem);
            color: var(--primary);
            margin-bottom: 1rem;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            border-radius: 4px;
        }

        /* Glassmorphism Navbar */
        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(224, 122, 95, 0.2);
            position: sticky;
            top: 0;
            z-index: 2000;
            width: 100%;
            transition: var(--transition);
        }

        .navbar.scrolled {
            background: rgba(253, 250, 246, 0.98);
            box-shadow: var(--shadow-sm);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text {
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.3s ease;
        }

        .logo-text:hover {
            transform: scale(1.02);
        }

        .nav-menu {
            display: flex;
            gap: 2.5rem;
            list-style: none;
            align-items: center;
        }

        .nav-menu a {
            text-decoration: none;
            color: var(--primary);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
            position: relative;
        }

        .nav-menu a::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent-light));
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::before,
        .nav-menu a.active::before {
            width: 100%;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            color: var(--accent);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 2001;
        }

        .hamburger span {
            width: 28px;
            height: 2px;
            background: var(--primary);
            transition: 0.3s;
        }

        /* Hero Section with Parallax */
        .hero {
            position: relative;
            min-height: 85vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, rgba(15, 43, 61, 0.7), rgba(10, 31, 44, 0.8)), url('https://images.unsplash.com/photo-1582268611958-ebfd161ef9cf?w=1600') center/cover no-repeat;
            background-blend-mode: overlay;
            background-attachment: fixed;
            border-radius: 0 0 4rem 4rem;
            overflow: hidden;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(0,0,0,0.2), rgba(0,0,0,0.5));
            border-radius: 0 0 4rem 4rem;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            padding: 2rem;
            animation: fadeUp 1s ease;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(224, 122, 95, 0.9);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: white;
            margin-bottom: 1.5rem;
        }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5.5rem);
            color: white;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .hero-description {
            font-size: 1.2rem;
            color: rgba(255,250,235,0.9);
            max-width: 650px;
            margin: 0 auto 2rem;
        }

        .hero-cta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--accent);
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .hero-cta:hover {
            background: var(--accent-glow);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -10px var(--accent);
        }

        /* Search & Filters */
        .search-section {
            margin-top: -2rem;
            position: relative;
            z-index: 10;
        }

        .filter-card {
            background: white;
            border-radius: 80px;
            padding: 0.8rem 1.5rem;
            box-shadow: var(--shadow-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            transition: var(--transition);
            border: 1px solid rgba(224, 122, 95, 0.2);
        }

        .filter-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
        }

        .filter-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.7rem 1.8rem;
            border-radius: 50px;
            background: #f5f0ea;
            border: none;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn i {
            transition: transform 0.2s;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .filter-btn:hover i {
            transform: scale(1.1);
        }

        .search-sort {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--accent);
        }

        .search-box input {
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            border-radius: 50px;
            border: 1px solid #e8e0d8;
            width: 250px;
            font-family: inherit;
            background: white;
            transition: var(--transition);
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            width: 280px;
            box-shadow: 0 0 0 3px rgba(224, 122, 95, 0.1);
        }

        .sort-select {
            padding: 0.8rem 2rem 0.8rem 1rem;
            border-radius: 50px;
            border: 1px solid #e8e0d8;
            background: white;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .sort-select:hover {
            border-color: var(--accent);
        }

        .results-count {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--gray);
            text-align: center;
            font-weight: 500;
        }

        /* Cards Grid */
        .hebergement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            padding: 3rem 0 4rem;
        }

        .hebergement-card {
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 0.6s ease forwards;
            position: relative;
        }

        .hebergement-card:hover {
            transform: translateY(-12px);
            box-shadow: var(--shadow-lg);
        }

        .card-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--accent);
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 3;
            backdrop-filter: blur(4px);
            letter-spacing: 0.5px;
        }

        .card-badge.popular {
            background: var(--primary);
        }

        .card-image {
            height: 280px;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: transform 0.6s ease;
        }

        .hebergement-card:hover .card-image {
            transform: scale(1.05);
        }

        .card-ambiance {
            position: absolute;
            bottom: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
            z-index: 3;
        }

        .ambiance-tag {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            padding: 0.3rem 0.9rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: white;
            font-weight: 500;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-content h3 {
            font-size: 1.6rem;
            margin-bottom: 0.3rem;
            color: var(--primary);
            transition: color 0.2s;
        }

        .hebergement-card:hover .card-content h3 {
            color: var(--accent);
        }

        .card-location {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--accent);
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }

        .card-price {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .btn-details {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            transition: var(--transition);
            cursor: pointer;
        }

        .btn-details:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        /* Modals */
        .modal-hebergement,
        .booking-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 30, 25, 0.9);
            backdrop-filter: blur(12px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-y: auto;
        }

        .modal-hebergement.active,
        .booking-modal.active {
            display: flex;
            animation: fadeScale 0.3s ease;
        }

        .modal-content,
        .booking-content {
            background: white;
            border-radius: 2rem;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: var(--shadow-lg);
            animation: fadeScale 0.4s ease;
        }

        .modal-close,
        .booking-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            z-index: 10;
        }

        .modal-close:hover,
        .booking-close:hover {
            background: var(--accent);
            color: white;
            transform: rotate(90deg);
        }

        .modal-gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.8rem;
            padding: 1rem;
            background: #faf5f0;
        }

        .modal-gallery-item {
            height: 90px;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .modal-gallery-item.active {
            border-color: var(--accent);
            transform: scale(1.02);
        }

        .modal-gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-main-media {
            width: 100%;
            height: 350px;
            overflow: hidden;
        }

        .modal-main-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .modal-main-media:hover img {
            transform: scale(1.05);
        }

        .modal-features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin: 1.5rem 0;
            background: #faf5f0;
            padding: 1rem;
            border-radius: 1.2rem;
        }

        .modal-feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-booking-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: bold;
            transition: var(--transition);
            cursor: pointer;
            margin-top: 1rem;
        }

        .modal-booking-btn:hover {
            background: linear-gradient(135deg, var(--accent), var(--accent-glow));
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px var(--accent);
        }

        .similar-grid {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .similar-item {
            flex: 1;
            min-width: 100px;
            background: #faf5f0;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            padding: 0.5rem;
        }

        .similar-item:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-sm);
        }

        .similar-item img {
            width: 100%;
            height: 80px;
            object-fit: cover;
            border-radius: 0.8rem;
        }

        /* Footer */
        .footer {
            background: var(--primary-dark);
            color: #e1d9cf;
            padding: 4rem 2rem 2rem;
            border-radius: 3rem 3rem 0 0;
            margin-top: 3rem;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        .footer-col h4 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: white;
        }

        .footer-col p {
            color: #b8c5c2;
            line-height: 1.6;
        }

        .social-icons {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .social-icons a {
            background: rgba(255,255,255,0.1);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: var(--transition);
        }

        .social-icons a:hover {
            background: var(--accent);
            transform: translateY(-3px) rotate(360deg);
        }

        /* Responsive */
        @media (max-width: 950px) {
            .nav-menu {
                display: none;
                flex-direction: column;
                background: white;
                position: absolute;
                top: 80px;
                left: 0;
                width: 100%;
                padding: 2rem;
                box-shadow: var(--shadow-md);
                gap: 1.5rem;
            }
            .nav-menu.active {
                display: flex;
                animation: fadeUp 0.3s ease;
            }
            .hamburger {
                display: flex;
            }
            .filter-card {
                flex-direction: column;
                border-radius: 2rem;
                align-items: stretch;
            }
            .search-sort {
                flex-direction: column;
                width: 100%;
            }
            .search-box input,
            .search-box input:focus {
                width: 100%;
            }
            .footer-container {
                grid-template-columns: repeat(2, 1fr);
                gap: 2rem;
            }
        }

        @media (max-width: 650px) {
            .container {
                padding: 0 20px;
            }
            .modal-gallery {
                grid-template-columns: repeat(3, 1fr);
            }
            .modal-main-media {
                height: 250px;
            }
            .hebergement-grid {
                grid-template-columns: 1fr;
            }
            .footer-container {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .social-icons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
        <div id="navbar-placeholder"></div>


<section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <span class="hero-badge"><i class="fas fa-star"></i> DESTINATION D'EXCEPTION</span>
        <h1 class="hero-title">Séjours inoubliables à Béjaïa</h1>
        <p class="hero-description">Villas de prestige, appartements avec vue mer et refuges authentiques pour des vacances méditerranéennes d'exception.</p>
        <a href="#hebergements" class="hero-cta" id="scrollToHebergements">Découvrir <i class="fas fa-arrow-down"></i></a>
    </div>
</section>

<div class="container search-section" id="hebergements">
    <div class="filter-card">
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all"><i class="fas fa-home"></i> Tous</button>
            <button class="filter-btn" data-filter="villa"><i class="fas fa-tree"></i> Villas</button>
            <button class="filter-btn" data-filter="appartement"><i class="fas fa-building"></i> Appartements</button>
            <button class="filter-btn" data-filter="chalet"><i class="fas fa-tree"></i> Chalets</button>

            
        </div>
        <div class="search-sort">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Rechercher un lieu...">
            </div>
            <select id="sortSelect" class="sort-select">
                <option value="default">Trier par</option>
                <option value="price-asc">Prix croissant</option>
                <option value="price-desc">Prix décroissant</option>
            </select>
        </div>
    </div>
    <div class="results-count" id="resultsCount">Chargement...</div>
</div>

<div class="container">
    <div class="hebergement-grid" id="hebergementGrid"></div>
</div>

<!-- Modal Hébergement -->
<div class="modal-hebergement" id="hebergementModal">
    <div class="modal-content">
        <button class="modal-close"><i class="fas fa-times"></i></button>
        <div class="modal-gallery" id="modalGallery"></div>
        <div class="modal-main-media" id="modalMainMedia"></div>
        <div style="padding: 1.5rem 2rem;">
            <h2 id="modalTitle" style="font-family: 'Playfair Display', serif;"></h2>
            <div class="modal-location" id="modalLocation" style="color: var(--accent); margin-bottom: 0.5rem;"></div>
            <p id="modalDescription" style="margin: 1rem 0;"></p>
            <div class="modal-features" id="modalFeatures"></div>
            <div class="modal-price" id="modalPrice" style="font-size: 1.8rem; font-weight: 800; color: var(--primary);"></div>
            <button class="modal-booking-btn" id="modalBookingBtn">Réserver maintenant <i class="fas fa-arrow-right"></i></button>
            <div style="margin-top: 1.5rem;">
                <h4 style="margin-bottom: 0.5rem;">Hébergements similaires</h4>
                <div class="similar-grid" id="similarProperties"></div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Réservation -->
<div class="booking-modal" id="bookingModal">
    <div class="booking-content" style="max-width: 550px; padding: 2rem;">
        <button class="booking-close"><i class="fas fa-times"></i></button>
        <h2 id="bookingTitle" style="font-family: 'Playfair Display', serif; margin-bottom: 1.5rem;">Confirmer votre séjour</h2>
        <form id="bookingForm">
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap;">
                <div style="flex: 1;"><label>Arrivée</label><input type="date" id="checkIn" required style="width: 100%; padding: 0.7rem; border-radius: 12px; border: 1px solid #ddd;"></div>
                <div style="flex: 1;"><label>Départ</label><input type="date" id="checkOut" required style="width: 100%; padding: 0.7rem; border-radius: 12px; border: 1px solid #ddd;"></div>
            </div>
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <div style="flex: 1;"><label>Adultes</label><select id="adults" style="width: 100%; padding: 0.7rem; border-radius: 12px;"><option>1</option><option selected>2</option><option>3</option><option>4</option></select></div>
                <div style="flex: 1;"><label>Enfants</label><select id="children" style="width: 100%; padding: 0.7rem; border-radius: 12px;"><option>0</option><option>1</option><option>2</option></select></div>
            </div>
            <div style="margin-bottom: 1rem;"><label>Nom complet</label><input type="text" id="fullName" placeholder="Votre nom" required style="width: 100%; padding: 0.7rem; border-radius: 12px; border: 1px solid #ddd;"></div>
            <div style="margin-bottom: 1rem;"><label>Email</label><input type="email" id="email" placeholder="email@exemple.com" required style="width: 100%; padding: 0.7rem; border-radius: 12px; border: 1px solid #ddd;"></div>
            <div id="totalPrice" style="font-size: 1.3rem; font-weight: 700; color: var(--accent); margin-bottom: 1rem; text-align: center;"></div>
            <button type="submit" style="width: 100%; background: var(--accent); padding: 1rem; border-radius: 60px; border: none; color: white; font-weight: 700; font-size: 1rem; cursor: pointer; transition: var(--transition);"><i class="fas fa-check-circle"></i> Confirmer la réservation</button>
        </form>
    </div>
</div>


        
 <script src="js/navbar.js"></script>

    <!-- Footer placeholder -->
    <div data-include="footer"></div>
    
    <script src="js/include-footer.js"></script>
<script>
    const properties = [
        { id: "v1", title: "Villa", location: "Tazeboucht, Béjaïa", description: "Chalet authentique au coeur d’une ferme sur les hauteurs de Tazeboucht, 3 chambres", longDescription: "Chalet authentique au coeur d'une ferme sur les hauteurs de Tazeboucht.1 chambre en lit double 2 chambres avec 2 lits 1 clic clac 1 place toilette et salle de bain kitchenette frigo ventilateur terasse avec table de pique nique vue degager sans vis a vis", price: 15000, type: "chalet", capacity: 10, rating: 4.9, popular: true, ambiance: ["🌊 Vue mer", "🏊 Piscine", "⭐ Luxe"], features: [{ icon: "fa-bed", text: "3 chambres" }, { icon: "fa-users", text: "10 pers" }, { icon: "fa-swimmer", text: "Piscine privée" }, { icon: "fa-wifi", text: "WiFi" }], images: ["assets/images/heber/villa6.jpeg", "assets/images/heber/villa3.jpeg", "assets/images/heber/villa2.jpeg","assets/images/heber/villa8.jpeg","assets/images/heber/villa1.jpeg"] },
        { id: "v2", title: "Appartement t3 en duplex cosy", location: "entre Boulimat et Saket", description: "Duplex Familial Cosy avec Terrasse & Vue Mer – À seulement 5 minutes des plages, dans une résidence sécurisée idéale pour vos séjours en famille.", longDescription: "Appartement t3 en duplex cosyAppartement avec 2 chambre, une chambre lit double parentale, bien agencé, literie confortable, vue mer, une deuxième chambre avec 2 lit 1 place pour les enfants confortables, au niveaux supérieurs 3 lit pour les invités comme une sorte de loft.Cuisine très bien équipé Terrasse avec sa table et ses chaise pour manger en regardant la mer.Tout sa dans une résidence sécurisée en bord de mer entre boulimat et saket. À 5 min des plages", price: 22000, type: "appartement", capacity: 8, rating: 4.7, popular: false, ambiance: ["🌳 Jardin", "🏊 Piscine"], features: [{ icon: "fa-bed", text: "4 chambres" }, { icon: "fa-tree", text: "Jardin" }], images: ["assets/images/heber/chal1.jpeg", "assets/images/heber/chal2.jpeg","assets/images/heber/chal3.jpeg","assets/images/heber/chal4.jpeg","assets/images/heber/chal5.jpeg"] },
        { id: "v3", title: "Villa Cap Carbon", location: "Cap Carbon", description: "Vue imprenable sur les falaises, 6 chambres", longDescription: "Piscine à débordement, hammam, vue panoramique sur la baie.", price: 35000, type: "villa", capacity: 12, rating: 5.0, popular: true, ambiance: ["🌊 Mer", "🏊 Piscine", "✨ Prestige"], features: [{ icon: "fa-eye", text: "Vue mer" }, { icon: "fa-hot-tub", text: "Spa" }], images: ["https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQO_E-RWL9ppT87d9rakdCW4yB2fDvCCszBV9mEdTbu&s", "https://cf.bstatic.com/xdata/images/hotel/max1024x768/315918665.jpg"] },
        { id: "a4", title: "Le Penthouse", location: "Centre Béjaïa", description: "Terrasse 80m², vue 360°", longDescription: "Penthouse exclusif, 3 chambres, salle à manger panoramique.", price: 18000, type: "appartement", capacity: 6, rating: 4.9, popular: true, ambiance: ["🏙️ Vue 360°", "✨ Luxe"], features: [{ icon: "fa-crown", text: "Penthouse" }, { icon: "fa-champagne-glasses", text: "Bar" }], images: ["https://a0.muscache.com/im/pictures/1f0f4596-dacb-42fe-9811-70673828640f.jpg"] }
    ];

    let currentProperty = null;
    let currentImages = [];

    function displayProperties(list) {
        const grid = document.getElementById('hebergementGrid');
        grid.innerHTML = '';
        list.forEach((p, idx) => {
            const card = document.createElement('div');
            card.className = 'hebergement-card';
            card.style.animationDelay = `${idx * 0.05}s`;
            const badge = p.popular ? '<div class="card-badge popular"><i class="fas fa-star"></i> Populaire</div>' : '<div class="card-badge">✨ Coup de cœur</div>';
            const ambianceTags = p.ambiance.map(a => `<span class="ambiance-tag">${a}</span>`).join('');
            card.innerHTML = `
                ${badge}
                <div class="card-image" style="background-image: url('${p.images[0]}'); background-size: cover; background-position: center;">
                    <div class="card-ambiance">${ambianceTags}</div>
                </div>
                <div class="card-content">
                    <h3>${p.title}</h3>
                    <div class="card-location"><i class="fas fa-map-marker-alt"></i> ${p.location}</div>
                    <p style="color: var(--gray); margin-bottom: 1rem;">${p.description}</p>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="card-price">${p.price.toLocaleString()} DZD <small style="font-size: 0.8rem;">/nuit</small></span>
                        <button class="btn-details" data-id="${p.id}">Détails</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.btn-details').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                openPropertyModal(btn.getAttribute('data-id'));
            });
        });
        document.getElementById('resultsCount').innerHTML = `<i class="fas fa-building"></i> ${list.length} hébergement(s) exceptionnel(s) disponible(s)`;
    }

    function applyFilters() {
        let list = [...properties];
        const active = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
        if (active !== 'all') list = list.filter(p => p.type === active);
        const search = document.getElementById('searchInput').value.toLowerCase();
        if (search) list = list.filter(p => p.title.toLowerCase().includes(search) || p.location.toLowerCase().includes(search));
        const sort = document.getElementById('sortSelect').value;
        if (sort === 'price-asc') list.sort((a,b) => a.price - b.price);
        if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
        displayProperties(list);
    }

    function openPropertyModal(id) {
        const prop = properties.find(p => p.id === id);
        if (!prop) return;
        currentProperty = prop;
        currentImages = prop.images;
        document.getElementById('modalTitle').innerText = prop.title;
        document.getElementById('modalLocation').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${prop.location}`;
        document.getElementById('modalDescription').innerText = prop.longDescription;
        document.getElementById('modalPrice').innerHTML = `${prop.price.toLocaleString()} DZD <small>/nuit</small>`;
        
        const featContainer = document.getElementById('modalFeatures');
        featContainer.innerHTML = '';
        prop.features.forEach(f => { featContainer.innerHTML += `<div class="modal-feature-item"><i class="fas ${f.icon}"></i> <span>${f.text}</span></div>`; });
        
        const galleryDiv = document.getElementById('modalGallery');
        galleryDiv.innerHTML = '';
        prop.images.forEach((img, idx) => {
            const div = document.createElement('div');
            div.className = 'modal-gallery-item' + (idx === 0 ? ' active' : '');
            div.innerHTML = `<img src="${img}" alt="view">`;
            div.addEventListener('click', () => setMainMedia(idx));
            galleryDiv.appendChild(div);
        });
        setMainMedia(0);
        
        const similar = properties.filter(p => p.type === prop.type && p.id !== prop.id).slice(0, 3);
        const similarDiv = document.getElementById('similarProperties');
        similarDiv.innerHTML = '';
        similar.forEach(s => {
            const simItem = document.createElement('div');
            simItem.className = 'similar-item';
            simItem.innerHTML = `<img src="${s.images[0]}" alt="${s.title}"><p><strong>${s.title}</strong><br>${s.price.toLocaleString()} DZD</p>`;
            simItem.addEventListener('click', () => openPropertyModal(s.id));
            similarDiv.appendChild(simItem);
        });
        document.getElementById('hebergementModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function setMainMedia(index) {
        if (!currentImages?.[index]) return;
        document.getElementById('modalMainMedia').innerHTML = `<img src="${currentImages[index]}" alt="vue principale">`;
        document.querySelectorAll('.modal-gallery-item').forEach((item, i) => {
            i === index ? item.classList.add('active') : item.classList.remove('active');
        });
    }

    function initBookingDates() {
        const today = new Date();
        const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
        const nextWeek = new Date(today); nextWeek.setDate(nextWeek.getDate()+7);
        const checkIn = document.getElementById('checkIn');
        const checkOut = document.getElementById('checkOut');
        if (checkIn) checkIn.valueAsDate = tomorrow;
        if (checkOut) checkOut.valueAsDate = nextWeek;
        checkIn?.addEventListener('change', updateTotalPrice);
        checkOut?.addEventListener('change', updateTotalPrice);
    }

    function calculateNights(start, end) {
        return Math.max(1, Math.ceil((new Date(end) - new Date(start)) / (1000*60*60*24)));
    }

    function updateTotalPrice() {
        if (!currentProperty) return;
        const checkIn = document.getElementById('checkIn').value;
        const checkOut = document.getElementById('checkOut').value;
        if (checkIn && checkOut) {
            const nights = calculateNights(checkIn, checkOut);
            const total = currentProperty.price * nights;
            document.getElementById('totalPrice').innerHTML = `💰 Total: ${total.toLocaleString()} DZD (${nights} nuits)`;
        }
    }

    function closeModals() {
        document.getElementById('hebergementModal')?.classList.remove('active');
        document.getElementById('bookingModal')?.classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    document.addEventListener('DOMContentLoaded', () => {
        displayProperties(properties);
        initBookingDates();
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                applyFilters();
            });
        });
        
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('sortSelect').addEventListener('change', applyFilters);
        
        document.querySelector('.modal-close')?.addEventListener('click', closeModals);
        document.querySelector('.booking-close')?.addEventListener('click', closeModals);
        
        document.getElementById('modalBookingBtn')?.addEventListener('click', () => {
            if (currentProperty) {
                updateTotalPrice();
                document.getElementById('bookingModal').classList.add('active');
            }
        });
        
        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert(`✨ Réservation confirmée pour ${currentProperty?.title}\nMerci ${document.getElementById('fullName').value}, un email de confirmation vous a été envoyé.`);
            closeModals();
        });
        
        const hamburger = document.getElementById('hamburgerBtn');
        const navMenu = document.getElementById('navMenu');
        hamburger?.addEventListener('click', () => navMenu.classList.toggle('active'));
        
        window.addEventListener('scroll', () => {
            document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 50);
        });
        
        document.getElementById('scrollToHebergements')?.addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('hebergements').scrollIntoView({ behavior: 'smooth' });
        });
    });
</script>
</body>
</html>
