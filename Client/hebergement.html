
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VisitBéjaïa | Hébergements d'exception</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #fefaf5;
            color: #2c3e3d;
            line-height: 1.5;
            overflow-x: hidden;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        h1, h2, h3, h4 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        /* Animations globales */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .fade-up {
            animation: fadeInUp 0.8s ease forwards;
        }

        .section-title {
            font-size: clamp(2.2rem, 5vw, 3.5rem);
            text-align: center;
            margin-bottom: 0.75rem;
            color: #1a3a6b;
            position: relative;
            padding-bottom: 1rem;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, #d32f2f, #1a3a6b);
            border-radius: 4px;
        }

        .section-subtitle {
            text-align: center;
            color: #5f7c76;
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto 2rem;
        }

        /* navbar avec effet glass */
        .navbar {
            background: rgba(255, 252, 245, 0.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(211, 47, 47, 0.15);
            position: sticky;
            top: 0;
            z-index: 2000;
            width: 100%;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            background: rgba(255, 252, 245, 0.98);
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 74px;
        }

        .logo h1 {
            font-size: 1.9rem;
            background: linear-gradient(135deg, #1a3a6b, #d32f2f);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -0.5px;
            transition: transform 0.3s ease;
        }

        .logo h1:hover {
            transform: scale(1.02);
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-menu a {
            text-decoration: none;
            color: #2b5a52;
            font-weight: 500;
            font-size: 0.95rem;
            transition: 0.3s;
            position: relative;
        }

        .nav-menu a:hover, .nav-menu a.active {
            color: #d32f2f;
        }

        .nav-menu a::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #1a3a6b, #d32f2f);
            transition: width 0.3s ease;
        }

        .nav-menu a:hover::after {
            width: 100%;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            z-index: 2001;
        }

        .hamburger span {
            width: 28px;
            height: 2px;
            background: #1a3a6b;
            transition: 0.3s;
        }

        /* hero avec parallaxe douce */
        .hero {
            position: relative;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, #0b2b2a, #0f3a32), url('https://images.unsplash.com/photo-1582268611958-ebfd161ef9cf?w=1600') center/cover no-repeat;
            background-blend-mode: overlay;
            background-attachment: fixed;
            border-radius: 0 0 3rem 3rem;
            overflow: hidden;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 20%, rgba(0,0,0,0.3), rgba(0,0,0,0.55));
            border-radius: 0 0 3rem 3rem;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
            padding: 2rem;
            animation: fadeInUp 1s ease;
        }

        .hero-title {
            font-size: clamp(2.5rem, 7vw, 5rem);
            color: white;
            text-shadow: 0 8px 25px rgba(0,0,0,0.3);
            margin-bottom: 1rem;
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            0% { text-shadow: 0 5px 15px rgba(0,0,0,0.3); }
            100% { text-shadow: 0 15px 35px rgba(211,47,47,0.5); }
        }

        .hero-description {
            font-size: 1.2rem;
            color: rgba(255,250,235,0.9);
            max-width: 650px;
            margin: 0 auto;
        }

        /* filtres animations */
        .filters-section {
            padding: 3rem 1rem 1rem;
            max-width: 1300px;
            margin: 0 auto;
        }

        .filter-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.2rem;
            background: white;
            padding: 1rem 1.8rem;
            border-radius: 80px;
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.1);
            border: 1px solid #ffe6dd;
            transition: all 0.3s ease;
        }

        .filter-container:hover {
            box-shadow: 0 20px 35px -12px rgba(26,58,107,0.2);
            transform: translateY(-2px);
        }

        .filter-buttons {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.6rem 1.8rem;
            border-radius: 40px;
            background: #f7f2ec;
            border: none;
            font-weight: 500;
            color: #2b5a52;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .filter-btn i {
            transition: transform 0.2s;
        }

        .filter-btn.active, .filter-btn:hover {
            background: #1a3a6b;
            color: white;
            transform: translateY(-3px);
        }

        .filter-btn:hover i {
            transform: rotate(15deg);
        }

        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #d32f2f;
            transition: all 0.2s;
        }

        .search-box input {
            padding: 0.7rem 1rem 0.7rem 2.6rem;
            border-radius: 50px;
            border: 1px solid #e2d9d0;
            width: 240px;
            font-family: inherit;
            background: #fff;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #1a3a6b;
            width: 280px;
            box-shadow: 0 0 0 3px rgba(26,58,107,0.1);
        }

        .sort-select {
            padding: 0.7rem 2rem 0.7rem 1rem;
            border-radius: 50px;
            border: 1px solid #e2d9d0;
            background: white;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sort-select:hover {
            border-color: #1a3a6b;
        }

        .results-count {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #7f8c8a;
            padding-left: 0.8rem;
            animation: fadeInUp 0.5s ease;
        }

        /* cartes avec animation au scroll */
        .hebergement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            padding: 2rem 1.5rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .hebergement-card {
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.1);
            cursor: pointer;
            border: 1px solid #f0e4da;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
        }

        .hebergement-card:hover {
            transform: translateY(-12px) scale(1.01);
            box-shadow: 0 30px 45px -15px rgba(26,58,107,0.3);
        }

        .card-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #d32f2f;
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            z-index: 3;
            backdrop-filter: blur(2px);
            animation: badgePulse 2s infinite;
        }

        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .card-badge.popular {
            background: #1a3a6b;
        }

        .card-image {
            height: 260px;
            background-size: cover;
            background-position: center;
            position: relative;
            transition: transform 0.5s ease;
        }

        .hebergement-card:hover .card-image {
            transform: scale(1.03);
        }

        .card-ambiance {
            position: absolute;
            bottom: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
            z-index: 3;
        }

        .ambiance-tag {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: white;
            font-weight: 500;
            transition: all 0.2s;
        }

        .hebergement-card:hover .ambiance-tag {
            transform: translateY(-2px);
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-content h3 {
            font-size: 1.7rem;
            margin-bottom: 0.3rem;
            color: #1a3a6b;
            transition: color 0.2s;
        }

        .hebergement-card:hover .card-content h3 {
            color: #d32f2f;
        }

        .card-location {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #d32f2f;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }

        .card-price {
            font-weight: 700;
            font-size: 1.4rem;
            color: #1a3a6b;
        }

        .btn-small {
            background: #1a3a6b;
            color: white;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn-small::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .btn-small:hover::before {
            left: 100%;
        }

        .btn-small:hover {
            background: #d32f2f;
            transform: translateY(-2px);
        }

        /* modales avec animations */
        .modal-hebergement, .booking-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 30, 25, 0.85);
            backdrop-filter: blur(10px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-y: auto;
        }

        .modal-hebergement.active, .booking-modal.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content, .booking-content {
            background: #fffcf9;
            border-radius: 2rem;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            animation: scaleIn 0.4s ease;
        }

        .modal-gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            padding: 1rem;
            background: #f7ede5;
            border-radius: 2rem 2rem 0 0;
        }

        .modal-gallery-item {
            height: 90px;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .modal-gallery-item.active {
            border-color: #d32f2f;
            transform: scale(1.02);
        }

        .modal-gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-main-media {
            width: 100%;
            height: 320px;
            overflow: hidden;
        }

        .modal-main-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .modal-main-media:hover img {
            transform: scale(1.05);
        }

        .modal-features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin: 1.2rem 0;
            background: #faf3ec;
            padding: 1rem;
            border-radius: 1.2rem;
        }

        .modal-booking-btn {
            width: 100%;
            background: linear-gradient(135deg, #1a3a6b, #2d5a9f);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 60px;
            font-weight: bold;
            transition: all 0.3s;
            cursor: pointer;
        }

        .modal-booking-btn:hover {
            background: linear-gradient(135deg, #d32f2f, #b52b2b);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(211,47,47,0.4);
        }

        .similar-grid {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .similar-item {
            flex: 1;
            background: #f5ede6;
            border-radius: 1rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }

        .similar-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* footer */
        .footer {
            background: #112f2b;
            color: #e1d9cf;
            padding: 3rem 2rem 1.5rem;
            border-radius: 3rem 3rem 0 0;
            margin-top: 3rem;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        .social-icons a {
            background: #2b5a52;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: all 0.3s;
        }

        .social-icons a:hover {
            background: #d32f2f;
            transform: rotate(360deg) scale(1.1);
        }

        @media (max-width: 850px) {
            .nav-menu {
                display: none;
                flex-direction: column;
                background: white;
                position: absolute;
                top: 74px;
                left: 0;
                width: 100%;
                padding: 1.5rem;
                box-shadow: 0 20px 30px rgba(0,0,0,0.1);
            }
            .nav-menu.active {
                display: flex;
                animation: fadeInUp 0.3s ease;
            }
            .hamburger {
                display: flex;
            }
            .filter-container {
                flex-direction: column;
                border-radius: 2rem;
                align-items: stretch;
            }
            .search-sort {
                flex-direction: column;
            }
            .footer-container {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .modal-gallery {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 550px) {
            .modal-gallery {
                grid-template-columns: repeat(2, 1fr);
            }
            .modal-main-media {
                height: 220px;
            }
            .similar-grid {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<!-- Navigation -->
   <div id="navbar-placeholder"></div>

<section class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
        <h1 class="hero-title">Séjours d'exception à Béjaïa</h1>
        <p class="hero-description">Villas de prestige, appartements avec vue mer et refuges authentiques pour des vacances méditerranéennes inoubliables.</p>
    </div>
</section>

<section class="filters-section">
    <div class="filter-container">
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all"><i class="fas fa-home"></i> Tous</button>
            <button class="filter-btn" data-filter="villa"><i class="fas fa-tree"></i> Villas</button>
            <button class="filter-btn" data-filter="appartement"><i class="fas fa-building"></i> Appartements</button>
        </div>
        <div class="search-sort">
            <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Rechercher..."></div>
            <select id="sortSelect" class="sort-select">
                <option value="default">Trier par</option>
                <option value="price-asc">Prix croissant</option>
                <option value="price-desc">Prix décroissant</option>
            </select>
        </div>
    </div>
    <div class="results-count" id="resultsCount">Chargement...</div>
</section>

<div class="hebergement-grid" id="hebergementGrid"></div>

<!-- Modal hébergement -->
<div class="modal-hebergement" id="hebergementModal">
    <div class="modal-content">
        <button class="modal-close" style="position:absolute; top:1rem; right:1rem; background:white; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;"><i class="fas fa-times"></i></button>
        <div class="modal-gallery" id="modalGallery"></div>
        <div class="modal-main-media" id="modalMainMedia"></div>
        <div class="modal-body" style="padding:1.5rem 2rem;">
            <h2 id="modalTitle" class="modal-title"></h2>
            <div class="modal-location" id="modalLocation"></div>
            <div class="modal-availability" id="modalAvailability">✓ Disponible</div>
            <p id="modalDescription" class="modal-description"></p>
            <div class="modal-features" id="modalFeatures"></div>
            <div class="modal-price" id="modalPrice"></div>
            <button class="modal-booking-btn" id="modalBookingBtn">Réserver maintenant</button>
            <div><h4>Similaires</h4><div class="similar-grid" id="similarProperties"></div></div>
        </div>
    </div>
</div>

<!-- Modal réservation -->
<div class="booking-modal" id="bookingModal">
    <div class="booking-content" style="max-width:550px; padding:2rem;">
        <button class="booking-close" style="position:absolute; top:1rem; right:1rem; background:white; border:none; width:40px; height:40px; border-radius:50%;"><i class="fas fa-times"></i></button>
        <h2 class="booking-title" id="bookingTitle">Réserver</h2>
        <form class="booking-form" id="bookingForm">
            <div class="form-row" style="display:flex; gap:1rem; margin-bottom:1rem;">
                <div class="form-group" style="flex:1"><label>Arrivée</label><input type="date" id="checkIn" required></div>
                <div class="form-group" style="flex:1"><label>Départ</label><input type="date" id="checkOut" required></div>
            </div>
            <div class="form-row" style="display:flex; gap:1rem; margin-bottom:1rem;">
                <div class="form-group" style="flex:1"><label>Adultes</label><select id="adults"><option>1</option><option selected>2</option><option>3</option><option>4</option></select></div>
                <div class="form-group" style="flex:1"><label>Enfants</label><select id="children"><option>0</option><option>1</option><option>2</option></select></div>
            </div>
            <div class="form-group" style="margin-bottom:1rem;"><label>Nom complet</label><input type="text" id="fullName" placeholder="Votre nom" required></div>
            <div class="form-group" style="margin-bottom:1rem;"><label>Email</label><input type="email" id="email" placeholder="email@exemple.com" required></div>
            <div class="total-price" id="totalPrice">Total: 0 DZD</div>
            <button type="submit" class="booking-submit" style="width:100%; background:#d32f2f; padding:1rem; border-radius:60px; border:none; color:white; font-weight:bold;"><i class="fas fa-check-circle"></i> Confirmer</button>
        </form>
    </div>
</div>
</div>
 <!-- Footer -->
    <div data-include="footer"></div>
     <script src="js/navbar.js"></script>
    <script src="js/include-footer.js"></script>

<script>

    let currentProperty = null;
    let currentImages = [];

    function displayProperties(list) {
        const grid = document.getElementById('hebergementGrid');
        grid.innerHTML = '';
        list.forEach((p, idx) => {
            const card = document.createElement('div');
            card.className = 'hebergement-card';
            card.style.animationDelay = `${idx * 0.05}s`;
            const badge = p.popular ? '<div class="card-badge popular"><i class="fas fa-star"></i> Populaire</div>' : '<div class="card-badge">✨ Nouveau</div>';
            const ambianceTags = p.ambiance.map(a => `<span class="ambiance-tag">${a}</span>`).join('');
            const heroImg = p.images[0];
            card.innerHTML = `
                ${badge}
                <div class="card-image" style="background-image: url('${heroImg}'); background-size: cover;">
                    <div class="card-ambiance">${ambianceTags}</div>
                </div>
                <div class="card-content">
                    <h3>${p.title}</h3>
                    <div class="card-location"><i class="fas fa-map-marker-alt"></i> ${p.location}</div>
                    <p class="card-description">${p.description}</p>
                    <div class="card-footer">
                        <span class="card-price">${p.price.toLocaleString()} DZD <small>/nuit</small></span>
                        <button class="btn-small" data-id="${p.id}">Détails</button>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
        document.querySelectorAll('.btn-small').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                openPropertyModal(btn.getAttribute('data-id'));
            });
        });
        document.getElementById('resultsCount').innerText = `${list.length} hébergement(s) disponible(s)`;
    }

    function applyFilters() {
        let list = [...properties];
        const active = document.querySelector('.filter-btn.active')?.dataset.filter || 'all';
        if (active !== 'all') list = list.filter(p => p.type === active);
        const search = document.getElementById('searchInput').value.toLowerCase();
        if (search) list = list.filter(p => p.title.toLowerCase().includes(search) || p.location.toLowerCase().includes(search));
        const sort = document.getElementById('sortSelect').value;
        if (sort === 'price-asc') list.sort((a,b) => a.price - b.price);
        if (sort === 'price-desc') list.sort((a,b) => b.price - a.price);
        displayProperties(list);
    }

    function openPropertyModal(id) {
        const prop = properties.find(p => p.id === id);
        if (!prop) return;
        currentProperty = prop;
        currentImages = prop.images;
        document.getElementById('modalTitle').innerText = prop.title;
        document.getElementById('modalLocation').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${prop.location}`;
        document.getElementById('modalDescription').innerText = prop.longDescription;
        document.getElementById('modalPrice').innerHTML = `${prop.price.toLocaleString()} DZD <small>/nuit</small>`;
        const featContainer = document.getElementById('modalFeatures');
        featContainer.innerHTML = '';
        prop.features.forEach(f => { featContainer.innerHTML += `<div class="modal-feature-item"><i class="fas ${f.icon}"></i> <span>${f.text}</span></div>`; });
        const galleryDiv = document.getElementById('modalGallery');
        galleryDiv.innerHTML = '';
        prop.images.forEach((img, idx) => {
            const div = document.createElement('div');
            div.className = 'modal-gallery-item' + (idx === 0 ? ' active' : '');
            div.innerHTML = `<img src="${img}" alt="view">`;
            div.addEventListener('click', () => setMainMedia(idx));
            galleryDiv.appendChild(div);
        });
        setMainMedia(0);
        const similar = properties.filter(p => p.type === prop.type && p.id !== prop.id).slice(0, 3);
        const similarDiv = document.getElementById('similarProperties');
        similarDiv.innerHTML = '';
        similar.forEach(s => {
            const simItem = document.createElement('div');
            simItem.className = 'similar-item';
            simItem.innerHTML = `<img src="${s.images[0]}" alt="${s.title}"><p>${s.title}<br><small>${s.price.toLocaleString()} DZD</small></p>`;
            simItem.addEventListener('click', () => openPropertyModal(s.id));
            similarDiv.appendChild(simItem);
        });
        document.getElementById('hebergementModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function setMainMedia(index) {
        if (!currentImages?.[index]) return;
        document.getElementById('modalMainMedia').innerHTML = `<img src="${currentImages[index]}" alt="vue principale">`;
        document.querySelectorAll('.modal-gallery-item').forEach((item, i) => {
            i === index ? item.classList.add('active') : item.classList.remove('active');
        });
    }

    function initBookingDates() {
        const today = new Date();
        const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
        const nextWeek = new Date(today); nextWeek.setDate(nextWeek.getDate()+7);
        const checkIn = document.getElementById('checkIn');
        const checkOut = document.getElementById('checkOut');
        if (checkIn) checkIn.valueAsDate = tomorrow;
        if (checkOut) checkOut.valueAsDate = nextWeek;
        checkIn?.addEventListener('change', updateTotalPrice);
        checkOut?.addEventListener('change', updateTotalPrice);
        document.getElementById('adults')?.addEventListener('change', updateTotalPrice);
        document.getElementById('children')?.addEventListener('change', updateTotalPrice);
    }

    function calculateNights(start, end) {
        return Math.max(1, Math.ceil((new Date(end) - new Date(start)) / (1000*60*60*24)));
    }

    function updateTotalPrice() {
        if (!currentProperty) return;
        const checkIn = document.getElementById('checkIn').value;
        const checkOut = document.getElementById('checkOut').value;
        if (checkIn && checkOut) {
            const nights = calculateNights(checkIn, checkOut);
            const total = currentProperty.price * nights;
            document.getElementById('totalPrice').innerHTML = `<i class="fas fa-calculator"></i> Total: ${total.toLocaleString()} DZD (${nights} nuits)`;
        }
    }

    function closeModals() {
        document.getElementById('hebergementModal')?.classList.remove('active');
        document.getElementById('bookingModal')?.classList.remove('active');
        document.body.style.overflow = 'auto';
    }

    document.addEventListener('DOMContentLoaded', () => {
        displayProperties(properties);
        initBookingDates();
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                applyFilters();
            });
