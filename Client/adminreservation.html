<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Visit Béjaïa - Administration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body {
            background: #f4f7fb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 0;
            margin: 0;
        }
        #root {
            width: 100%;
            max-width: 1400px;
            min-height: 100vh;
            background: #f4f7fb;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f0f0f0; border-radius: 8px; }
        ::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #a0a0a0; }

        /* ===== LOADING ===== */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .loading-spinner {
            border: 4px solid #e0e0e0;
            border-top: 4px solid #FF6B35;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            margin-top: 16px;
            font-size: 16px;
            color: #FF6B35;
            font-weight: 500;
        }

        /* ===== LOGIN ===== */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2540, #1a3a5c, #2a4a6c);
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 28px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-card .logo .icon {
            font-size: 48px;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .login-card .logo h1 {
            font-size: 24px;
            font-weight: 800;
            color: #0a2540;
        }
        .login-card .logo p {
            color: #666;
            font-size: 14px;
        }
        .login-card .form-group {
            margin-bottom: 16px;
        }
        .login-card .form-group label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            color: #444;
            margin-bottom: 6px;
        }
        .login-card .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 14px;
            font-size: 15px;
            transition: border 0.2s;
            background: #f8f9fa;
        }
        .login-card .form-group input:focus {
            outline: none;
            border-color: #0077b6;
            background: white;
        }
        .login-card .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0077b6, #005f8c);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .login-card .login-btn:hover { opacity: 0.9; }
        .login-card .error {
            background: #ffebee;
            color: #c62828;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }
        .login-card .error.show { display: block; }

        /* ===== APP CONTAINER ===== */
        .app-container {
            background: #f4f7fb;
            min-height: 100vh;
            position: relative;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #0a2540 0%, #1a3a5c 50%, #2a4a6c 100%);
            padding: 20px 20px 16px;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.12);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }
        .logo-subtext {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            margin-top: 1px;
        }
        .header-icons {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.12);
            border: none;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.22); }
        .notif-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #FF6B6B;
            border-radius: 50%;
            min-width: 18px;
            height: 18px;
            font-size: 9px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
        .profile-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            color: white;
            cursor: pointer;
        }
        .welcome-section {
            margin-top: 14px;
        }
        .welcome-greeting {
            font-size: 13px;
            color: rgba(255,255,255,0.65);
        }
        .welcome-name {
            font-size: 22px;
            font-weight: 700;
            color: white;
            margin: 2px 0 4px;
        }
        .welcome-date {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        .header-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .header-stat {
            text-align: center;
        }
        .header-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }
        .header-stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            margin-top: 2px;
        }
        .header-stat-divider {
            width: 1px;
            background: rgba(255,255,255,0.15);
        }

        /* ===== MAIN LAYOUT ===== */
        .main-layout {
            display: flex;
            min-height: calc(100vh - 200px);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 200px;
            background: white;
            padding: 20px 10px 20px;
            border-right: 1px solid #edf2f7;
            flex-shrink: 0;
            height: calc(100vh - 180px);
            position: sticky;
            top: 180px;
            overflow-y: auto;
        }
        .sidebar-label {
            font-size: 10px;
            font-weight: 600;
            color: #9aa0a6;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 0 12px;
            margin-bottom: 12px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            color: #4a5568;
            font-weight: 500;
            font-size: 13px;
            margin-bottom: 2px;
            transition: all 0.15s;
        }
        .nav-item:hover { background: #f0f4f8; }
        .nav-item.active {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: white;
            box-shadow: 0 4px 12px rgba(255,107,53,0.3);
        }
        .nav-item i { width: 20px; font-size: 14px; text-align: center; }
        .nav-item.active i { color: white; }

        /* ===== CONTENT ===== */
        .content {
            flex: 1;
            padding: 16px 16px 80px;
            min-height: 600px;
        }
        .tab-content {
            animation: fadeUp 0.4s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== CARDS ===== */
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px 18px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin-bottom: 16px;
            border: 1px solid #f0f0f0;
        }
        .card-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #0a2540;
        }

        /* ===== TODAY ===== */
        .today-header {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin-bottom: 16px;
            text-align: center;
        }
        .today-header h2 {
            font-size: 20px;
            font-weight: 700;
            color: #0a2540;
        }
        .today-header .date {
            font-size: 13px;
            color: #6b7a8f;
            margin-top: 4px;
        }
        .today-header .count {
            font-size: 13px;
            color: #0077b6;
            font-weight: 600;
            margin-top: 4px;
        }
        .date-picker-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f8f9fa;
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            margin-top: 8px;
            font-size: 13px;
            color: #333;
        }
        .date-picker-btn:hover { background: #f0f0f0; }

        /* ===== BOAT TODAY ===== */
        .boat-today-section {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .boat-today-title {
            font-size: 15px;
            font-weight: 700;
            color: #2e7d32;
            padding: 14px 16px;
            background: #f8f9fa;
            border-bottom: 1px solid #e8e8e8;
        }
        .boat-today-row {
            padding: 10px 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .boat-today-row:last-child { border-bottom: none; }
        .boat-today-slot {
            background: linear-gradient(135deg, #1b5e20, #2e7d32);
            color: white;
            font-weight: 700;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 8px;
        }
        .boat-today-boats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .boat-today-cell {
            background: #f8fbf8;
            padding: 10px 12px;
            border-radius: 10px;
        }
        .boat-today-cell h4 {
            font-size: 12px;
            color: #2e7d32;
            margin-bottom: 6px;
        }
        .boat-today-reservation {
            background: #e8f5e9;
            padding: 8px 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            border-left: 3px solid #4caf50;
            cursor: pointer;
        }
        .boat-today-reservation:hover { background: #d4edda; }
        .boat-today-reservation p {
            font-size: 11px;
            color: #333;
            margin: 1px 0;
        }
        .boat-today-reservation .label { font-weight: 600; }

        /* ===== TABLE ===== */
        .table-container {
            overflow-x: auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .table-container table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 700px;
        }
        .table-container th {
            background: #0a2540;
            color: white;
            font-weight: 600;
            padding: 10px 8px;
            text-align: left;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .table-container td {
            padding: 10px 8px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }
        .table-container tr:hover td { background: #fafbfc; }
        .table-container tr:last-child td { border-bottom: none; }

        .activity-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 16px;
            color: white;
            font-size: 10px;
            font-weight: 600;
        }
        .payment-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 16px;
            color: white;
            font-size: 10px;
            font-weight: 600;
        }
        .payment-badge i { font-size: 10px; }

        .note-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
            min-height: 60px;
        }
        .reste-positive { color: #c62828; font-weight: 700; }
        .reste-zero { color: #4caf50; font-weight: 700; }

        .empty-state {
            text-align: center;
            padding: 32px 16px;
        }
        .empty-state .emoji { font-size: 40px; margin-bottom: 8px; }
        .empty-state h3 { color: #666; font-weight: 500; font-size: 15px; }
        .empty-state p { color: #999; font-size: 13px; margin-top: 4px; }

        /* ===== RESERVATION CARD ===== */
        .reservation-card {
            background: white;
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 1px solid #f0f0f0;
            cursor: pointer;
        }
        .reservation-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
        .reservation-card .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .reservation-card .header-row .id {
            font-weight: 700;
            color: #0077b6;
            font-size: 13px;
        }
        .reservation-card .header-row .delete-btn {
            color: #dc3545;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .reservation-card .header-row .delete-btn:hover { background: #fee8e8; }
        .reservation-card .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 4px 12px;
            font-size: 12px;
            color: #333;
        }
        .reservation-card .info-grid .item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .reservation-card .info-grid .item i { color: #888; width: 16px; font-size: 12px; }

        /* ===== BOAT FORM ===== */
        .boat-form {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .boat-form .form-title {
            font-size: 17px;
            font-weight: 700;
            color: #0a2540;
            margin-bottom: 16px;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 12px;
            color: #444;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 13px;
            background: #f8f9fa;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0077b6;
            background: white;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .chip-group {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .chip {
            padding: 6px 14px;
            border-radius: 16px;
            border: 1px solid #0077b6;
            background: white;
            color: #0077b6;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }
        .chip:hover { background: #e3f2fd; }
        .chip.active {
            background: #0077b6;
            color: white;
            border-color: #0077b6;
        }
        .slot-item {
            padding: 8px 12px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            text-align: center;
            min-width: 70px;
            font-weight: 500;
            font-size: 12px;
        }
        .slot-item.available { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
        .slot-item.unavailable { border-color: #f44336; background: #ffebee; color: #c62828; opacity: 0.6; cursor: not-allowed; }
        .slot-item.selected { border-color: #0077b6; background: #e3f2fd; color: #0077b6; }
        .slot-item .status { font-size: 9px; display: block; margin-top: 2px; }
        .slot-item .status.free { color: #4caf50; }
        .slot-item .status.occupied { color: #f44336; }
        .slot-item .status.selected { color: #0077b6; }

        .selected-time {
            margin-top: 6px;
            font-size: 13px;
            font-weight: 600;
            color: #0077b6;
            text-align: center;
        }
        .select-hint {
            margin-top: 6px;
            font-size: 11px;
            color: #666;
            text-align: center;
            font-style: italic;
        }

        /* ===== PAYMENT ===== */
        .payment-section {
            background: #f0f7ff;
            padding: 14px 16px;
            border-radius: 12px;
            border: 2px solid #0077b6;
            margin: 12px 0;
        }
        .payment-section h4 {
            color: #0077b6;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .payment-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .payment-row .full { grid-column: 1 / -1; }
        .payment-field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #0077b6;
            margin-bottom: 3px;
        }
        .payment-field input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #0077b6;
            border-radius: 8px;
            background: white;
            font-size: 13px;
        }
        .payment-field input:focus { outline: none; border-color: #005f8c; }
        .payment-field .reste-input {
            background: #fff3e0;
            border-color: #f44336;
            font-weight: 700;
            color: #c62828;
        }
        .payment-field .reste-label { color: #c62828; }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0077b6, #005f8c);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-submit:hover { opacity: 0.9; }

        /* ===== ADMIN ===== */
        .admin-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .admin-row input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 13px;
            background: #f8f9fa;
            min-width: 120px;
        }
        .admin-row input:focus { outline: none; border-color: #f97316; background: white; }
        .btn-add {
            background: #f97316;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-add:hover { background: #e86a0a; }

        .slot-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .slot-tag {
            padding: 4px 12px;
            border-radius: 16px;
            background: #e3f2fd;
            color: #0a2540;
            font-size: 12px;
            cursor: pointer;
            border: none;
        }
        .slot-tag:hover { background: #bbdefb; }
        .slot-tag.delete-mode { background: #f44336; color: white; }
        .slot-tag.delete-mode:hover { background: #d32f2f; }

        .admin-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .admin-actions button {
            padding: 8px 16px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
        }
        .admin-actions button:hover { opacity: 0.85; }
        .btn-delete-mode { background: #dc3545; color: white; }
        .btn-reset { background: #ff9800; color: white; }

        /* ===== EMPLOYEURS ===== */
        .online-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .online-stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

    <script>
        // ============================================================
        // ADMIN DASHBOARD — VERSION WEB (CORRIGÉE)
        // ============================================================
    
        // ---- API CONFIG ----
        const isLocalHost = location.hostname === 'localhost' || location.hostname === '127.0.0.1' || !location.hostname;
        const API_BASE_URL = isLocalHost
            ? (location.port === '3000' ? `${window.location.origin}/api/reservations-admin` : 'http://127.0.0.1:3000/api/reservations-admin')
            : 'https://visitebejai.onrender.com/api/reservations-admin';
        const API_USERS_URL = isLocalHost
            ? (location.port === '3000' ? `${window.location.origin}/api/users` : 'http://127.0.0.1:3000/api/users')
            : 'https://visitebejai.onrender.com/api/users';

        const BOAT_PRICE_BY_MINUTES = {
            30: 8000,
            60: 16000,
            90: 20000,
            120: 20000,
            150: 25000,
            180: 35000,
            210: 40000
        };

        function derivePaymentStatus(total, versement, reste) {
            const t = parseFloat(total) || 0;
            const v = parseFloat(versement) || 0;
            const r = reste != null ? (parseFloat(reste) || 0) : Math.max(0, t - v);
            if (t > 0 && (v >= t || r <= 0)) return 'paye';
            if (v > 0) return 'verse';
            return 'non_paye';
        }

        function escapeHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function normalizeReservation(raw) {
            if (!raw) return raw;
            const total = parseFloat(raw.totalAPayer ?? raw.totalapayer) || 0;
            const versement = parseFloat(raw.versement) || 0;
            const reste = raw.resteAPayer != null || raw.resteapayer != null
                ? (parseFloat(raw.resteAPayer ?? raw.resteapayer) || 0)
                : Math.max(0, total - versement);
            const note = (raw.note && String(raw.note).trim()) || 'Aucune note';
            return {
                ...raw,
                totalAPayer: total,
                versement,
                resteAPayer: reste,
                note,
                paymentStatus: derivePaymentStatus(total, versement, reste)
            };
        }

        function suggestBoatTotal() {
            const minutes = parseInt(state.boatCircuit, 10);
            if (!BOAT_PRICE_BY_MINUTES[minutes]) return;
            if (!state.boatTotalAPayer || parseFloat(state.boatTotalAPayer) <= 0) {
                state.boatTotalAPayer = String(BOAT_PRICE_BY_MINUTES[minutes]);
                calculerResteBateau();
            }
        }
    
        // ---- ÉTAT GLOBAL ----
        const state = {
            isLoggedIn: false,
            loginError: '',
            userInfo: { id: 1, nom: 'Admin', prenom: 'Super', email: 'admin@visitbejai.com', telephone: '0555123456', role: 'admin' },
            loading: true,
            reservations: [],
            filteredReservations: [],
            reservationsLoading: false,
            refreshing: false,
            activeTab: 'today',
            searchDate: '',
            searchName: '',
            showDatePicker: false,

            showTimePicker: false,
            showDatePickerClient: false,
            totalAPayer: '', versement: '', resteAPayer: '0', note: '',
            boatNom: '', boatPrenom: '', boatTel: '', boatCircuit: '60', boatSlot: '09h-11h',
            boatNumber: '1', boatDate: '', showBoatDatePicker: false, boatSelectedTime: '',
            boatTotalAPayer: '', boatVersement: '', boatResteAPayer: '0', boatNote: '',
            timeSlots: ['09h-11h', '11h-13h', '13h-15h', '15h-17h', '17h-19h'],
            newSlot: '',
            deleteMode: false,
            boatReservations: [],
            employeurs: [],
            employeursLoading: false,
            showCreateEmployeurModal: false,
            onlineEmployeurs: [],
            showOnlineOnly: false,
            newEmployeur: { nom: '', prenom: '', email: '', password: '', telephone: '', role: 'employeur' },
            modalVisible: false,
            profileModalVisible: false,
            notifModalVisible: false,
            detailModalVisible: false,
            selectedReservation: null,
            editProfileModalVisible: false,
            editProfile: { nom: '', prenom: '', telephone: '', email: '' },
            todaySelectedDate: new Date().toISOString().split('T')[0],
            showDatePickerToday: false,
            // Nouveau: pour éviter les re-rendus inutiles
            updatingFromInput: false
        };
    
        let rootEl = document.getElementById('root');
    
        // ---- FONCTIONS UTILES ----
        function formatDateFR(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }
    
        function getTodayStr() {
            return new Date().toISOString().split('T')[0];
        }
    
        function timeToMinutes(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.split(':');
            if (parts.length === 2) return parseInt(parts[0]) * 60 + parseInt(parts[1]);
            const match = timeStr.match(/(\d+)h(\d+)/);
            if (match) return parseInt(match[1]) * 60 + parseInt(match[2]);
            return 0;
        }
    
        function formatLastActive(date) {
            if (!date) return 'Jamais';
            const now = new Date();
            const diff = now - new Date(date);
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            if (minutes < 1) return 'À l\'instant';
            if (minutes < 60) return `Il y a ${minutes} min`;
            if (hours < 24) return `Il y a ${hours} h`;
            return `Il y a ${days} j`;
        }
    
        function getPaymentStatusText(status) {
            switch(status) {
                case 'paye': return { text: 'Payé', color: '#4caf50', icon: 'fa-check-circle' };
                case 'verse': return { text: 'Acompte versé', color: '#ff9800', icon: 'fa-clock' };
                default: return { text: 'Non payé', color: '#f44336', icon: 'fa-times-circle' };
            }
        }
    
        function getActivityColor(activite) {
            const colors = {
                'Bateau': '#4caf50',
                'Visite guidée': '#2196f3',
                'Quad': '#ff9800',
                'Cheval': '#8bc34a',
                'Jetski': '#00bcd4',
                'Parapente': '#9c27b0',
                'Kayak': '#ff6f00',
                'Bouée tractée': '#e91e63'
            };
            return colors[activite] || '#757575';
        }
    
        // ---- STORAGE ----
        function storageGet(key) {
            try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
        }
        function storageSet(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }
    
        // ---- API HELPERS ----
        async function apiFetch(url, options = {}) {
            const token = localStorage.getItem('token');
            const headers = {
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
                ...options.headers,
            };
            const res = await fetch(url, { ...options, headers });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.message || data.error || `HTTP ${res.status}`);
            return data;
        }
    
        // ---- AUTHENTIFICATION ----
        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
    
            if (email === 'admin' && password === 'visitbejaia2026') {
                state.isLoggedIn = true;
                state.loginError = '';
                localStorage.setItem('token', 'fake-token');
                localStorage.setItem('user', JSON.stringify(state.userInfo));
                init();
            } else {
                state.loginError = 'Email ou mot de passe incorrect';
                render();
            }
        }
    
        function handleLogout() {
            if (!confirm('Voulez-vous vraiment vous déconnecter ?')) return;
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            state.isLoggedIn = false;
            render();
        }
    
        // ---- CHARGEMENT INITIAL ----
        async function init() {
            const token = localStorage.getItem('token');
            const userStr = localStorage.getItem('user');
    
            if (token && userStr) {
                state.isLoggedIn = true;
                try {
                    state.userInfo = JSON.parse(userStr);
                    await loadInitialData();
                } catch (e) {
                    console.error('Erreur chargement:', e);
                }
            } else {
                state.isLoggedIn = false;
            }
    
            state.loading = false;
            render();
        }
    
        async function loadInitialData() {
            await Promise.all([
                loadSlots(),
                loadReservations(),
                loadEmployeurs()
            ]);
        }
    
        async function loadSlots() {
            try {
                const saved = localStorage.getItem('timeSlots');
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.timeSlots = parsed;
                    if (parsed.length > 0 && !state.boatSlot) state.boatSlot = parsed[0];
                } else {
                    const defaultSlots = ['09h-11h', '11h-13h', '13h-15h', '15h-17h', '17h-19h'];
                    state.timeSlots = defaultSlots;
                    state.boatSlot = defaultSlots[0];
                    localStorage.setItem('timeSlots', JSON.stringify(defaultSlots));
                }
            } catch (e) { console.error('Erreur chargement créneaux:', e); }
        }
    
        async function loadReservations() {
            state.reservationsLoading = true;
            try {
                const data = await apiFetch(API_BASE_URL);
                state.reservations = data.map(normalizeReservation);
                state.filteredReservations = state.reservations;
                state.boatReservations = state.reservations.filter(r => r.activite === 'Bateau');
            } catch (e) {
                console.error('Erreur chargement réservations:', e);
                const local = localStorage.getItem('reservationsData');
                const data = local ? JSON.parse(local) : [];
                state.reservations = data;
                state.filteredReservations = data;
                state.boatReservations = data.filter(r => r.activite === 'Bateau');
            }
            state.reservationsLoading = false;
            render();
        }
    
        async function loadEmployeurs() {
            state.employeursLoading = true;
            try {
                const data = await apiFetch(`${API_USERS_URL}/employeurs`);
                state.employeurs = data;
                const now = new Date();
                const onlineStatus = data.map(emp => ({
                    ...emp,
                    isOnline: Math.random() > 0.5,
                    lastActive: new Date(now.getTime() - Math.random() * 7200000),
                    lastActiveStr: formatLastActive(new Date(now.getTime() - Math.random() * 7200000))
                }));
                state.onlineEmployeurs = onlineStatus;
            } catch (e) {
                console.error('Erreur chargement employeurs:', e);
                state.employeurs = [];
                state.onlineEmployeurs = [];
            }
            state.employeursLoading = false;
            render();
        }
    
        function saveSlots(slots) {
            localStorage.setItem('timeSlots', JSON.stringify(slots));
            state.timeSlots = slots;
            if (slots.length > 0 && !slots.includes(state.boatSlot)) {
                state.boatSlot = slots[0];
            }

        // ---- AJOUT RÉSERVATION BATEAU ----
        function checkBoatAvailability(date, startTime, boatNum, durationMinutes) {
            if (!date) return false;
            const startTotal = timeToMinutes(startTime);
            const endTotal = startTotal + durationMinutes;
            return state.boatReservations.some(r => {
                if (r.date !== date) return false;
                if (r.bateau !== `Bateau ${boatNum}`) return false;
                const rStart = timeToMinutes(r.heure);
                const rEnd = rStart + (parseInt(r.duree) || 60);
                return (startTotal < rEnd && endTotal > rStart);
            });
        }
    
        function getBoatStartTimes() {
            return state.timeSlots.map(slot => {
                const [start] = slot.split('-');
                const hour = parseInt(start.replace('h', ''));
                return `${hour.toString().padStart(2, '0')}:00`;
            });
        }

            const vers = parseFloat(state.boatVersement) || 0;
            if (vers > total) {

            }
    
            const reste = Math.max(0, total - vers);
            const note = state.boatNote.trim() || 'Aucune note';
            const durationMinutes = parseInt(state.boatCircuit);
            const startTime = state.boatSelectedTime;
            const boatNum = state.boatNumber;
    
            if (checkBoatAvailability(state.boatDate, startTime, boatNum, durationMinutes)) {

        // ---- MISE À JOUR STATUT PAIEMENT ----
        async function updatePaymentStatus(id, status, amount) {
            const res = state.reservations.find(r => r.id === id);
            if (!res) return;

            const total = parseFloat(res.totalAPayer) || 0;
            if (status === 'verse') {
                res.versement = Math.min(parseFloat(amount) || 0, total);
            } else if (status === 'paye') {
                res.versement = total;
            } else {
                res.versement = 0;
            }
            res.resteAPayer = Math.max(0, total - res.versement);
            const normalized = normalizeReservation(res);

            const updatedReservations = state.reservations.map(r => r.id === id ? normalized : r);
            state.reservations = updatedReservations;
            state.filteredReservations = updatedReservations;
            state.boatReservations = updatedReservations.filter(r => r.activite === 'Bateau');
            localStorage.setItem('reservationsData', JSON.stringify(updatedReservations));
            if (state.selectedReservation && state.selectedReservation.id === id) {
                state.selectedReservation = normalized;
            }
            render();

            try {
                const payload = {
                    nom: normalized.nom,
                    prenom: normalized.prenom,
                    tel: normalized.tel,
                    activite: normalized.activite,
                    heure: normalized.heure,
                    date: normalized.date,
                    personnes: normalized.personnes,
                    slot: normalized.slot || null,
                    subslot: normalized.subslot || null,
                    bateau: normalized.bateau || null,
                    duree: normalized.duree || null,
                    totalAPayer: normalized.totalAPayer,
                    versement: normalized.versement,
                    resteAPayer: normalized.resteAPayer,
                    note: normalized.note
                };
                await apiFetch(`${API_BASE_URL}/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
            } catch (e) {
                console.error('Erreur mise à jour paiement:', e);
            }
        }

        // ---- ATTACHER LES ÉVÉNEMENTS APRÈS RENDU ----
        function attachEvents() {
            // Événements pour les champs de recherche (sans re-rendu)
            const searchInput = document.getElementById('search-name-input');
            if (searchInput) {
                searchInput.addEventListener('input', function(e) {
                    state.searchName = this.value;
                    // Recherche en temps réel sans re-rendu complet
                    const filtered = state.reservations.filter(r => {
                        const q = state.searchName.toLowerCase();
                        return (r.nom && r.nom.toLowerCase().includes(q)) ||
                               (r.prenom && r.prenom.toLowerCase().includes(q));
                    });
                    state.filteredReservations = filtered;
                    // Mettre à jour uniquement la liste des réservations
                    updateReservationsList();
                });
            }
    
            // Événements pour les inputs du formulaire client
            const clientInputs = document.querySelectorAll('.client-input');
            clientInputs.forEach(input => {
                const handler = function() {
                    const field = this.dataset.field;
                    if (field) {
                        state[field] = this.value;
                        if (field === 'totalAPayer' || field === 'versement') {
                            calculerReste();
                        }
                    }
                };
                input.addEventListener('input', handler);
                if (input.tagName === 'TEXTAREA') input.addEventListener('change', handler);
            });
    
            // Événements pour les inputs du formulaire bateau
            const boatInputs = document.querySelectorAll('.boat-input');
            boatInputs.forEach(input => {
                const handler = function() {
                    const field = this.dataset.field;
                    if (field) {
                        state[field] = this.value;
                        if (field === 'boatTotalAPayer' || field === 'boatVersement') {
                            calculerResteBateau();
                        }
                    }
                };
                input.addEventListener('input', handler);
                if (input.tagName === 'TEXTAREA') input.addEventListener('change', handler);
            });
    
            // Événements pour les date pickers
            document.querySelectorAll('.date-picker-native').forEach(el => {
                el.addEventListener('change', function(e) {
                    const val = e.target.value;
                    const action = this.dataset.action;
                    if (action === 'today') {
                        state.todaySelectedDate = val;
                        render();
                    } else if (action === 'search') {
                        state.searchDate = val;
                        render();
                    } else if (action === 'client') {
                        state.date = val;
                    } else if (action === 'boat') {
                        state.boatDate = val;
                        render();
                    }
                });
            });
    
            // Événements pour les time pickers
            document.querySelectorAll('.time-picker-native').forEach(el => {
                el.addEventListener('change', function(e) {
                    const val = e.target.value;
                    if (this.dataset.action === 'client') {
                        state.heure = val;
                    }
                });
            });

            suggestBoatTotal();
            calculerResteBateau();
            const totalC = parseFloat(state.totalAPayer) || 0;
            const versC = parseFloat(state.versement) || 0;
            updatePaymentStatusPreview(totalC, versC, 'status-client');
            const totalB = parseFloat(state.boatTotalAPayer) || 0;

            updatePaymentStatusPreview(totalB, versB, 'status-bateau');

                else statusText = '<span class="status free">✓ Libre</span>';
    
                const onclick = boatDate ? `state.boatSelectedTime='${time}'; render();` : `alert('Veuillez d\\'abord sélectionner une date')`;
    
                return `

                                    </div>
                                </div>
                                <div style="margin-top:8px;">
                                    <label style="font-size:12px;color:#666;">Statut paiement</label>
                                    <div id="status-client" style="margin-top:4px;"></div>
                                </div>
                                <div class="form-group" style="margin-top:8px;">
                                    <label>📝 Note / Remarque</label>
                                    <textarea class="client-input note-input" data-field="note" rows="2" placeholder="Ex: Allergies, préférences, infos complémentaires...">${escapeHtml(state.note)}</textarea>
                                </div>
                            </div>
    
                            <button class="btn-submit" onclick="addReservation();">✅ Ajouter la réservation</button>
                        </div>
                    </div>
                </div>
            `;
        }
    
        function renderProfileModal() {
            const u = state.userInfo;
            return `
                <div class="modal-overlay" onclick="if(event.target===this){state.profileModalVisible=false; render();}">
                    <div class="modal profile-modal" style="max-width:450px;">
                        <div class="profile-header">
                            <div class="profile-avatar">${u.prenom?.[0] || ''}${u.nom?.[0] || ''}</div>
                            <div class="profile-name">${u.prenom} ${u.nom}</div>
                            <div class="profile-email">${u.email}</div>
                            <div class="profile-phone">📞 ${u.telephone || 'Non renseigné'}</div>
                        </div>
                        <div style="padding:8px 0;">
                            <button class="profile-menu-item" onclick="state.profileModalVisible=false; state.editProfile={nom:'${u.nom}',prenom:'${u.prenom}',telephone:'${u.telephone||''}',email:'${u.email}'}; state.editProfileModalVisible=true; render();">
                                <i class="fas fa-user"></i> Modifier mon profil
                            </button>
                            <button class="profile-menu-item">
                                <i class="fas fa-chart-bar"></i> Statistiques
                            </button>
                            <button class="profile-menu-item">
                                <i class="fas fa-cog"></i> Paramètres
                            </button>
                            <button class="profile-menu-item logout" onclick="handleLogout();">
                                <i class="fas fa-sign-out-alt"></i> Déconnexion
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
    
        function renderEditProfileModal() {
            return `
                <div class="modal-overlay" onclick="if(event.target===this){state.editProfileModalVisible=false; render();}">
                    <div class="modal">
                        <div class="modal-header" style="background:linear-gradient(135deg,#0a2540,#1a3a5c);">
                            <h2>✏️ Modifier mon profil</h2>
                            <button class="close-btn" onclick="state.editProfileModalVisible=false; render();"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label>Nom</label>
                                <input type="text" value="${state.editProfile.nom}" oninput="state.editProfile.nom=this.value; render();" />
                            </div>
                            <div class="form-group">
                                <label>Prénom</label>
                                <input type="text" value="${state.editProfile.prenom}" oninput="state.editProfile.prenom=this.value; render();" />
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" value="${state.editProfile.email}" oninput="state.editProfile.email=this.value; render();" />
                            </div>
                            <div class="form-group">
                                <label>Téléphone</label>
                                <input type="tel" value="${state.editProfile.telephone}" oninput="state.editProfile.telephone=this.value; render();" />
                            </div>
                            <button class="btn-submit" style="background:linear-gradient(135deg,#4caf50,#45a049);" onclick="updateUserProfile();">💾 Sauvegarder</button>
                        </div>
                    </div>
                </div>
            `;
        }
    
        function renderNotifModal() {
            const onlineCount = state.onlineEmployeurs.filter(e => e.isOnline).length;
            return `
                <div class="modal-overlay" onclick="if(event.target===this){state.notifModalVisible=false; render();}">
                    <div class="modal" style="max-width:450px;">
                        <div class="modal-header" style="background:white; border-bottom:1px solid #f0f0f0;">
                            <h2 style="color:#0a2540;">🔔 Notifications</h2>
                            <button class="close-btn" style="color:#333;" onclick="state.notifModalVisible=false; render();"><i class="fas fa-times"></i></button>
                        </div>
                        <div style="padding:4px 0;">
                            ${[
                                { icon: 'fa-calendar-day', text: `📅 ${state.reservations.filter(r => r.date === getTodayStr()).length} réservation(s) aujourd'hui`, sub: new Date().toLocaleDateString('fr-FR') },
                                { icon: 'fa-ship', text: `🚤 ${state.boatReservations.length} réservation(s) bateau au total`, sub: 'Statistiques' },
                                { icon: 'fa-users', text: `👥 ${state.reservations.length} réservation(s) totale(s)`, sub: 'Toutes activités confondues' },
                                { icon: 'fa-users', text: `👥 ${state.employeurs.length} employeur(s) enregistré(s)`, sub: 'Comptes actifs' },
                                { icon: 'fa-cloud', text: `🟢 ${onlineCount} employeur(s) en ligne`, sub: 'Actuellement actifs' }
                            ].map(item => `
                                <div class="notif-item">
                                    <div class="icon"><i class="fas ${item.icon}"></i></div>
                                    <div class="content">
                                        <h4>${item.text}</h4>
                                        <p>${item.sub}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }
    
        function renderDetailModal() {
            const r = state.selectedReservation;
            if (!r) return '';
            const payment = getPaymentStatusText(r.paymentStatus || 'non_paye');
            return `
                <div class="modal-overlay" onclick="if(event.target===this){state.detailModalVisible=false; render();}">
                    <div class="modal" style="max-width:550px;">
                        <div class="modal-header" style="background:linear-gradient(135deg,#0a2540,#1a3a5c);">
                            <h2>Détails de la réservation</h2>
                            <button class="close-btn" onclick="state.detailModalVisible=false; render();"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="modal-body">
                            <div class="detail-section">
                                <h4>👤 Informations client</h4>
                                <div class="detail-row"><i class="fas fa-user"></i><span class="label">Nom complet:</span><span class="value">${r.nom} ${r.prenom}</span></div>
                                <div class="detail-row"><i class="fas fa-phone"></i><span class="label">Téléphone:</span><span class="value">${r.tel || 'Non renseigné'}</span></div>
                            </div>
    
                            <div class="detail-section">
                                <h4>📅 Informations réservation</h4>
                                <div class="detail-row"><i class="fas fa-calendar"></i><span class="label">Date:</span><span class="value">${r.date}</span></div>
                                <div class="detail-row"><i class="fas fa-clock"></i><span class="label">Heure:</span><span class="value">${r.heure || '--:--'}</span></div>
                                <div class="detail-row"><i class="fas fa-users"></i><span class="label">Personnes:</span><span class="value">${r.personnes}</span></div>
                                <div class="detail-row"><i class="fas fa-tag"></i><span class="label">Activité:</span><span class="value"><span class="activity-badge" style="background:${getActivityColor(r.activite)};padding:2px 10px;border-radius:10px;font-size:11px;">${r.activite}</span></span></div>
                                ${r.bateau ? `<div class="detail-row"><i class="fas fa-ship"></i><span class="label">Bateau:</span><span class="value">${r.bateau}</span></div>` : ''}
                                ${r.duree ? `<div class="detail-row"><i class="fas fa-hourglass"></i><span class="label">Durée:</span><span class="value">${r.duree}</span></div>` : ''}
                            </div>
    
                            <div class="detail-section">
                                <h4>💰 Paiement</h4>
                                <div class="detail-row"><i class="fas fa-money-bill"></i><span class="label">Total à payer:</span><span class="value">${r.totalAPayer || 0} DA</span></div>
                                <div class="detail-row"><i class="fas fa-credit-card"></i><span class="label">Versement:</span><span class="value">${r.versement || 0} DA</span></div>
                                <div class="detail-row"><i class="fas fa-arrow-down"></i><span class="label">Reste à payer:</span><span class="value ${(r.resteAPayer || 0) > 0 ? 'reste-positive' : 'reste-zero'}">${r.resteAPayer || 0} DA</span></div>
                                <div class="detail-row"><i class="fas fa-check-circle"></i><span class="label">Statut:</span><span class="value"><span class="payment-badge" style="background:${payment.color}"><i class="fas ${payment.icon}"></i> ${payment.text}</span></span></div>

                                <div class="payment-actions">
                                    <button class="btn-non-paye" onclick="updatePaymentStatus(${r.id},'non_paye',0); state.detailModalVisible=false; render();">❌ Non payé</button>
                                    <button class="btn-verse" onclick="const amt=prompt('Montant de l\\'acompte (DA):'); if(amt!==null && !isNaN(amt)){updatePaymentStatus(${r.id},'verse',parseInt(amt)); state.detailModalVisible=false; render();}">💰 Acompte</button>
                                    <button class="btn-paye" onclick="updatePaymentStatus(${r.id},'paye',0); state.detailModalVisible=false; render();">✅ Payé</button>
                                </div>
                            </div>

                            <div class="detail-section">
                                <h4>📝 Note</h4>
                                <div class="detail-row"><i class="fas fa-sticky-note"></i><span class="label">Remarque:</span><span class="value">${escapeHtml(r.note || 'Aucune note')}</span></div>
                            </div>
    
                            <button class="btn-delete-detail" onclick="state.detailModalVisible=false; deleteReservation(${r.id});">
                                <i class="fas fa-trash"></i> Supprimer la réservation
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
    
        function renderCreateEmployeurModal() {
            const emp = state.newEmployeur;
            return `
                <div class="modal-overlay" onclick="if(event.target===this){state.showCreateEmployeurModal=false; render();}">
                    <div class="modal">
                        <div class="modal-header" style="background:linear-gradient(135deg,#4caf50,#45a049);">
                            <h2>👥 Nouvel employeur</h2>
                            <button class="close-btn" onclick="state.showCreateEmployeurModal=false; render();"><i class="fas fa-times"></i></button>
                        </div>
                        <div class="modal-body">
                            <div class="form-group">
                                <label>Nom *</label>
                                <input type="text" placeholder="Nom" value="${emp.nom}" oninput="state.newEmployeur.nom=this.value; render();" />
                            </div>
                            <div class="form-group">
                                <label>Prénom *</label>
                                <input type="text" placeholder="Prénom" value="${emp.prenom}" oninput="state.newEmployeur.prenom=this.value; render();" />
                            </div>
                            <div class="form-group">
                                <label>Email *</label>
                                <input type="email" placeholder="Email" value="${emp.email}" oninput="state.newEmployeur.email=this.value; render();" />
                            </div>
                            <div class="form-group">
                                <label>Mot de passe * (min 6 caractères)</label>
                                <input type="password" placeholder="Mot de passe" value="${emp.password}" oninput="state.newEmployeur.password=this.value; render();" />
                            </div>
                            <div class="form-group">
                                <label>Téléphone</label>
                                <input type="tel" placeholder="Téléphone" value="${emp.telephone}" oninput="state.newEmployeur.telephone=this.value; render();" />
                            </div>
                            <div class="form-group">
                                <label>Rôle</label>
                                <div class="chip-group">
                                    <div class="chip ${emp.role === 'employeur' ? 'active' : ''}" onclick="state.newEmployeur.role='employeur'; render();">Employeur</div>
                                    <div class="chip ${emp.role === 'admin' ? 'active' : ''}" onclick="state.newEmployeur.role='admin'; render();">Admin</div>
                                </div>
                            </div>
                            <button class="btn-submit" style="background:linear-gradient(135deg,#4caf50,#45a049);" onclick="createEmployeur();">✅ Créer le compte</button>
                        </div>
                    </div>
                </div>
            `;
        }
    
        // ---- LANCEMENT ----
        init();
    </script>

</body>
</html>
