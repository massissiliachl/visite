<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestion des Passeports</title>

  <!-- Excel library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    h1 {
      text-align: center;
    }

    form {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }

    input, button {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
    }

    button {
      cursor: pointer;
    }

    .add-btn {
      grid-column: span 2;
      background: #007bff;
      color: white;
      border: none;
    }

    .export-btn {
      background: green;
      color: white;
      border: none;
      margin-bottom: 10px;
      padding: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    th {
      background: #007bff;
      color: white;
    }

    .delete {
      background: red;
      color: white;
      border: none;
      padding: 5px;
    }

    .edit {
      background: orange;
      color: white;
      border: none;
      padding: 5px;
      margin-left: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Gestion Passeports</h1>

  <button class="export-btn" onclick="exportExcel()">📤 Export Excel</button>

  <form id="form">
    <input type="text" id="nom" placeholder="Nom" required>
    <input type="text" id="prenom" placeholder="Prénom" required>
    <input type="text" id="passport" placeholder="N° Passport" required>
    <input type="date" id="delivrance" required>
    <input type="date" id="expiration" required>
    <button class="add-btn" type="submit">Ajouter</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Passport</th>
        <th>Délivrance</th>
        <th>Expiration</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="table"></tbody>
  </table>
</div>

<script>
let data = JSON.parse(localStorage.getItem("passports")) || [];
const table = document.getElementById("table");
const form = document.getElementById("form");

function render() {
  table.innerHTML = "";

  data.forEach((p, i) => {
    table.innerHTML += `
      <tr>
        <td>${p.nom}</td>
        <td>${p.prenom}</td>
        <td>${p.passport}</td>
        <td>${p.delivrance}</td>
        <td>${p.expiration}</td>
        <td>
          <button class="delete" onclick="removeItem(${i})">X</button>
          <button class="edit" onclick="editItem(${i})">Edit</button>
        </td>
      </tr>
    `;
  });

  localStorage.setItem("passports", JSON.stringify(data));
}

form.addEventListener("submit", e => {
  e.preventDefault();

  data.push({
    nom: nom.value,
    prenom: prenom.value,
    passport: passport.value,
    delivrance: delivrance.value,
    expiration: expiration.value
  });

  form.reset();
  render();
});

function removeItem(i) {
  data.splice(i, 1);
  render();
}

function editItem(i) {
  let p = data[i];

  nom.value = p.nom;
  prenom.value = p.prenom;
  passport.value = p.passport;
  delivrance.value = p.delivrance;
  expiration.value = p.expiration;

  data.splice(i, 1);
  render();
}

function exportExcel() {
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Passeports");
  XLSX.writeFile(wb, "passeports.xlsx");
}

render();
</script>

</body>
</html>
