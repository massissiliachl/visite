<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Visit Bejaia | Expériences & Aventures</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #faf9f8;
            color: #1e293b;
            overflow-x: hidden;
        }

        #canvas-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.4;
        }

        .container {
            position: relative;
            z-index: 5;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem 5rem;
        }

        .hero-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-bottom: 3rem;
            overflow: hidden;
            z-index: 2;
        }

        .hero-bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.75) contrast(1.1);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0.3) 100%);
            z-index: -1;
        }

        .hero-content {
            max-width: 800px;
            padding: 2rem;
            animation: fadeInUp 1s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 0.6rem 1.5rem;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 8vw, 5.5rem);
            font-weight: 800;
            color: white;
            margin-bottom: 1rem;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
            line-height: 1.1;
        }

        .hero-content h1 span {
            background: linear-gradient(135deg, #f97316, #fbbf24);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero-content p {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.95);
            max-width: 600px;
            margin: 0 auto;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            animation: bounce 2s infinite;
            cursor: pointer;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        .hero-section.hide-hero {
            animation: slideUpFade 0.8s ease forwards;
        }

        @keyframes slideUpFade {
            0% {
                opacity: 1;
                transform: translateY(0);
                max-height: 100vh;
            }
            100% {
                opacity: 0;
                transform: translateY(-100px);
                max-height: 0;
                margin-bottom: 0;
                padding: 0;
                visibility: hidden;
            }
        }

        .filter-section {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0 3rem;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s ease;
        }

        .filter-section.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .filter-btn {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.7rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #475569;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn.active {
            background: #f97316;
            color: white;
            border-color: #f97316;
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.25);
        }

        .activities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .activity-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
            position: relative;
            opacity: 0;
            transform: translateY(30px);
            animation: cardFadeIn 0.6s ease forwards;
        }

        .card-media {
            height: 220px;
            overflow: hidden;
        }

        .card-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        @keyframes cardFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .activity-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 50px -20px rgba(249, 115, 22, 0.25);
        }

        .card-header {
            padding: 1.8rem 1.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .icon-circle {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, #fff5eb, #ffe6d5);
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            color: #1d3ddb;
            transition: 0.3s;
        }

        .price-badge {
            background: linear-gradient(135deg, #fef9c3, #fef3c7);
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1rem;
            color: #334155;
        }

        .card-title {
            font-size: 1.6rem;
            font-weight: 700;
            padding: 0 1.8rem;
            margin-bottom: 0.5rem;
            font-family: 'Playfair Display', serif;
        }

        .card-desc {
            padding: 0 1.8rem;
            color: #64748b;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 1.2rem;
        }

        .btn-book {
            margin: 1.5rem 1.8rem 1.8rem;
            background: linear-gradient(95deg, #a90303, #a90303);
            border: none;
            padding: 1rem;
            border-radius: 3rem;
            font-weight: 700;
            color: white;
            width: calc(100% - 3.6rem);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-book:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px -8px #a90303;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-container {
            background: white;
            max-width: 550px;
            width: 90%;
            border-radius: 2rem;
            padding: 2rem;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #fef3c7;
            padding-bottom: 0.8rem;
        }

        .modal-header h3 {
            font-size: 1.8rem;
            color: #a90303;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            font-weight: 600;
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            color: #334155;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            border-radius: 1rem;
            border: 1.5px solid #e2e8f0;
            font-family: inherit;
            transition: 0.2s;
        }

        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #a90303;
        }

        .price-summary {
            background: linear-gradient(135deg, #fff7ed, #fffbeb);
            padding: 1.2rem;
            border-radius: 1.2rem;
            text-align: center;
            margin: 1.2rem 0;
            border: 1px solid #fed7aa;
        }

        .price-summary strong {
            font-size: 1.2rem;
            color: #a90303;
        }

        .btn-submit {
            background: linear-gradient(95deg, #a90303, #a90303);
            width: 100%;
            padding: 1rem;
            border-radius: 3rem;
            border: none;
            font-weight: 700;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px #a90303;
        }

        .toast-notification {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 1rem 2rem;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1001;
            transition: transform 0.3s ease;
            font-weight: 500;
        }

        .toast-notification.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast-notification.success { background: #16a34a; }
        .toast-notification.error { background: #dc2626; }
        .toast-notification.warning { background: #f59e0b; }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1002;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .loading-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #a90303;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .whatsapp-float {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #25D366;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
            z-index: 99;
            transition: 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .card-title { font-size: 1.3rem; }
            .icon-circle { width: 55px; height: 55px; font-size: 1.6rem; }
        }

        .error-message {
            color: #dc2626;
            font-size: 0.75rem;
            margin-top: 0.25rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-group.error input {
            border-color: #dc2626;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div id="navbar-placeholder"></div>
    <canvas id="canvas-3d"></canvas>
    
    <section class="hero-section" id="heroSection">
        <img src="assets/images/incountournable.png" alt="Béjaïa plage" class="hero-bg-image" id="heroImage" onerror="this.src='https://via.placeholder.com/1920x1080?text=Bejaia'">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <div class="hero-badge">
                <i class="fas fa-map-marker-alt"></i> Béjaïa, perle de la Méditerranée
            </div>
            <h1>L'aventure <br><span>vous attend</span></h1>
            <p>Quad, jet ski, parapente, cheval… Vivez des expériences uniques avec @visit.bejaia</p>
        </div>
        <div class="scroll-indicator" id="scrollIndicator">
            <i class="fas fa-chevron-down"></i>
            <p>Découvrir</p>
        </div>
    </section>

    <div class="container">
        <div class="filter-section" id="filterSection">
            <button class="filter-btn active" data-filter="all">✨ Toutes</button>
            <button class="filter-btn" data-filter="mer">🌊 Nautiques</button>
            <button class="filter-btn" data-filter="terre">⛰️ Terre & Sensations</button>
            <button class="filter-btn" data-filter="culture">🏛️ Culture & Détente</button>
        </div>

        <div class="activities-grid" id="activitiesGrid"></div>
    </div>

    <a href="https://wa.me/213557664089" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modalTitle">Réserver</h3>
                <button style="background:none; border:none; font-size:2rem; cursor:pointer; color:#94a3b8;" id="closeModalBtn">&times;</button>
            </div>
            <form id="reservationForm">
                <div class="form-group" id="fullNameGroup">
                    <label>Nom complet * <span style="color:#dc2626; font-size:0.7rem;">(Nom et Prénom)</span></label>
                    <input type="text" id="fullName" placeholder="Ex: Massissilia Chalal" required>
                    <div class="error-message" id="fullNameError">⚠️ Veuillez entrer votre NOM et PRÉNOM (séparés par un espace)</div>
                </div>
                <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
                <div class="form-group"><label>Téléphone *</label><input type="tel" id="phone" required></div>
                <div class="form-group"><label>Date souhaitée *</label><input type="date" id="date" required></div>
                <div class="form-group"><label>Adultes *</label><input type="number" id="adults" min="1" value="1" required></div>
                <div class="form-group" id="childGroup" style="display:none;"><label>Enfants <span id="childExtraLabel"></span></label><input type="number" id="children" min="0" value="0"></div>
<div class="form-group">
    <label>Mode de paiement</label>
    <select id="paymentMethod">
        <option value="BaridiMob">BaridiMob</option>
        <option value="CCP">CCP</option>
        <option value="Virement">Virement</option>
        <option value="PayPal"> PayPal (Confirmation WhatsApp)</option>
    </select>
</div>                <div class="form-group"><label>Référence transaction</label><input type="text" id="transactionRef" placeholder="ex: 123456"></div>
                <div class="form-group"><label>Demandes spéciales</label><textarea id="specialRequests" rows="2"></textarea></div>
                <div class="price-summary"><strong>💰 Total : <span id="totalPriceDisplay">0 DA</span></strong><br><small>🔖 Acompte 30% : <span id="depositAmount">0 DA</span></small></div>
                <button type="submit" class="btn-submit">✅ Confirmer la réservation</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast-notification"></div>
    <div id="loading" class="loading-overlay"><div class="spinner"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/navbar.js"></script>

    <!-- Footer placeholder -->
    <div data-include="footer"></div>
    
    <script src="js/include-footer.js"></script>
    <script>
        console.log("=== APPLICATION DÉMARRÉE ===");
        
        // Scroll animation
        const heroSection = document.getElementById('heroSection');
        const filterSection = document.getElementById('filterSection');
        let heroHidden = false;

        function handleScroll() {
            const scrollY = window.scrollY;
            if (scrollY > 100 && !heroHidden) {
                heroSection.classList.add('hide-hero');
                heroHidden = true;
                filterSection.classList.add('visible');
            } else if (scrollY <= 100 && heroHidden) {
                heroSection.classList.remove('hide-hero');
                heroHidden = false;
                if (scrollY === 0) filterSection.classList.remove('visible');
            }
        }

        window.addEventListener('scroll', handleScroll);
        document.getElementById('scrollIndicator')?.addEventListener('click', () => {
            window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
        });

        // Activités
        const activitiesCatalog = [
            { id: "visite", name: "Visite Guidée", basePrice: 6000, category: "culture", icon: "fa-landmark", image: "assets/images/casbah.jpg", desc: "Découvrez Béjaïa historique : Gouraya, Casbah, cascade.", hasChild: false },
            { id: "parapente", name: "Parapente", basePrice: 6000, category: "terre", icon: "fa-parachute-box", image: "assets/images/vol parapente.jpg", desc: "Baptême parapente, atterrissage plage, sensations uniques.", hasChild: false },
            { id: "quad", name: "Randonnée Quad", basePrice: 3000, category: "terre", icon: "fa-motorcycle", image: "assets/images/quad.jpeg", desc: "Circuit sur les hauteurs de Boulimat.", hasChild: true, childPrice: 1000, options: [{label:"30 min", price:3000},{label:"45 min", price:4000}] },
            { id: "cheval", name: "Randonnée à Cheval", basePrice: 2500, category: "terre", icon: "fa-horse", image: "assets/images/chev.jpg", desc: "Entre mer et montagne dans le parc de Gouraya.", hasChild: false },
            { id: "parasailing", name: "Parasailing", basePrice: 10000, category: "mer", icon: "fa-parachute-box", image: "assets/images/vol.jpg", desc: "Envolez-vous au-dessus de la mer.", hasChild: false },
            { id: "bouee", name: "Bouée Tractée", basePrice: 3000, category: "mer", icon: "fa-water", image: "assets/images/tr.jpg", desc: "Adrénaline et fous rires garantis.", hasChild: false },
            { id: "jetski", name: "Jet Ski", basePrice: 30000, category: "mer", icon: "fa-jet-fighter", image: "assets/images/jet.jpg", desc: "Sensations fortes en liberté (1h).", hasChild: false },
            { id: "bateau", name: "Excursion Bateau", basePrice: 20000, category: "mer", icon: "fa-ship", image: "assets/images/grotte.jpg", desc: "Découvrez île de Nizla, grotte des pirates.", hasChild: false }
        ];

        let currentAct = { id: '', name: '', pricePerAdult: 0, hasChild: false, childPrice: 0 };

        function renderCards(filter = "all") {
            const grid = document.getElementById("activitiesGrid");
            const filtered = filter === "all" ? activitiesCatalog : activitiesCatalog.filter(a => a.category === filter);
            grid.innerHTML = filtered.map((act, idx) => {
                let optsHtml = "";
                if (act.id === "quad") {
                    optsHtml = `<div class="options-group" style="padding:0 1.5rem; margin:1rem 0; background:#f8fafc; border-radius:1rem; margin-left:1.8rem; margin-right:1.8rem;">
                        <div class="option-item" style="display:flex; justify-content:space-between; padding:0.7rem 0; border-bottom:1px solid #e2e8f0;">
                            <label><input type="radio" name="quadOpt_${idx}" value="3000" checked> 🏍️ 30 minutes - 3000 DA</label>
                        </div>
                        <div class="option-item" style="display:flex; justify-content:space-between; padding:0.7rem 0;">
                            <label><input type="radio" name="quadOpt_${idx}" value="4000"> 🏍️ 45 minutes - 4000 DA</label>
                        </div>
                        <div class="child-extra" style="display:flex; align-items:center; gap:0.8rem; padding:0.7rem 0;">
                            <input type="checkbox" class="childQuadCheck" data-idx="${idx}"> <label>👶 Enfant derrière (+1000 DA)</label>
                        </div>
                    </div>`;
                }
                return `<div class="activity-card">
                    <div class="card-media">
                        <img src="${act.image}" alt="${act.name}" loading="lazy" onerror="this.src='assets/images/all.jpg'">
                    </div>
                    <div class="card-header"><div class="icon-circle"><i class="fas ${act.icon}"></i></div><div class="price-badge">${act.id === "quad" ? "Dès 3000 DA" : act.basePrice.toLocaleString('fr-DZ') + " DA"}</div></div>
                    <h3 class="card-title">${act.name}</h3>
                    <p class="card-desc">${act.desc}</p>
                    ${optsHtml}
                    <button class="btn-book" data-id="${act.id}" data-name="${act.name}" data-price="${act.basePrice}" data-idx="${idx}"><i class="fas fa-calendar-check"></i> Réserver</button>
                </div>`;
            }).join('');

            document.querySelectorAll('.btn-book').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = btn.dataset.id;
                    const name = btn.dataset.name;
                    let price = parseInt(btn.dataset.price);
                    let hasChild = false;
                    let childPrice = 0;
                    if (id === 'quad') {
                        const idx = btn.dataset.idx;
                        const card = btn.closest('.activity-card');
                        const selected = card.querySelector(`input[name="quadOpt_${idx}"]:checked`);
                        price = selected ? parseInt(selected.value) : 3000;
                        const childCheck = card.querySelector('.childQuadCheck');
                        hasChild = childCheck ? childCheck.checked : false;
                        childPrice = 1000;
                    }
                    openModal(id, name, price, hasChild, childPrice);
                });
            });
        }

        function openModal(id, name, price, hasChild, childPrice) {
            currentAct = { id, name, pricePerAdult: price, hasChild, childPrice };
            document.getElementById("modalTitle").innerHTML = `📅 Réserver · ${name}`;
            const childGroup = document.getElementById("childGroup");
            if (hasChild) {
                childGroup.style.display = "block";
                document.getElementById("childExtraLabel").innerHTML = `(+${childPrice} DA/enfant)`;
            } else childGroup.style.display = "none";
            document.getElementById("adults").value = 1;
            document.getElementById("children").value = 0;
            document.getElementById("fullName").value = "";
            document.getElementById("fullName").classList.remove("error");
            document.getElementById("fullNameError").classList.remove("show");
            updateTotal();
            document.getElementById("modalOverlay").classList.add("active");
        }

        function updateTotal() {
            let adults = parseInt(document.getElementById("adults").value) || 1;
            let children = parseInt(document.getElementById("children").value) || 0;
            let total = currentAct.pricePerAdult * adults;
            if (currentAct.hasChild) total += children * currentAct.childPrice;
            const deposit = Math.round(total * 0.3);
            document.getElementById("totalPriceDisplay").innerHTML = total.toLocaleString('fr-DZ') + " DA";
            document.getElementById("depositAmount").innerHTML = deposit.toLocaleString('fr-DZ') + " DA";
        }

        function showToast(msg, type = "success") {
            const toast = document.getElementById("toast");
            toast.textContent = msg;
            toast.className = `toast-notification ${type}`;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 4000);
        }

        function setLoading(show) {
            const loader = document.getElementById("loading");
            if (show) loader.classList.add("active");
            else loader.classList.remove("active");
        }

        // Fonction pour valider que le nom contient au moins un espace (nom + prénom)
        function validateFullName(fullName) {
            const trimmed = fullName.trim();
            const parts = trimmed.split(/\s+/);
            return parts.length >= 2 && parts[0].length > 0 && parts[1].length > 0;
        }

        async function sendReservation(payload) {
            const API_URL = 'http://localhost:3000/api/reservations';
            console.log("Envoi à l'API:", payload);
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                console.log("Réponse API:", response.status, data);
                
                if (!response.ok) {
                    throw new Error(data.message || data.error || `Erreur ${response.status}`);
                }
                
                return { success: true, data: data, apiResponse: true };
                
            } catch (error) {
                console.error("Erreur API:", error);
                
                // Sauvegarde locale
                const localReservations = JSON.parse(localStorage.getItem('bejaia_reservations') || '[]');
                const newReservation = {
                    ...payload,
                    id: Date.now(),
                    created_at: new Date().toISOString(),
                    saved_locally: true
                };
                localReservations.push(newReservation);
                localStorage.setItem('bejaia_reservations', JSON.stringify(localReservations));
                
                return { success: true, local: true, data: newReservation };
            }
        }

        function closeModal() {
            document.getElementById("modalOverlay").classList.remove("active");
        }

        // Validation en temps réel du champ nom complet
        document.getElementById("fullName").addEventListener("input", function(e) {
            const isValid = validateFullName(e.target.value);
            const group = document.getElementById("fullNameGroup");
            const errorDiv = document.getElementById("fullNameError");
            
            if (!isValid && e.target.value.trim().length > 0) {
                group.classList.add("error");
                errorDiv.classList.add("show");
            } else {
                group.classList.remove("error");
                errorDiv.classList.remove("show");
            }
        });

document.getElementById("reservationForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const fullName = document.getElementById("fullName").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const date = document.getElementById("date").value;
    const adults = parseInt(document.getElementById("adults").value);
    const children = parseInt(document.getElementById("children").value) || 0;
    const payment = document.getElementById("paymentMethod").value;
    const transRef = document.getElementById("transactionRef").value.trim();
    const special = document.getElementById("specialRequests").value;

    // Validation du nom complet
    if (!validateFullName(fullName)) {
        showToast("⚠️ Veuillez entrer votre NOM et PRÉNOM complets", "warning");
        return;
    }

    if (!email || !phone || !date || !adults) {
        showToast("Veuillez remplir tous les champs obligatoires", "error");
        return;
    }

    // Calcul du total
    let total = currentAct.pricePerAdult * adults;
    if (currentAct.hasChild) total += children * currentAct.childPrice;
    const deposit = Math.round(total * 0.3);
    
    // Séparation du nom
    const nameParts = fullName.split(/\s+/);
    const nom = nameParts[0];
    const prenom = nameParts.slice(1).join(" ");

    // 🔥 SI L'UTILISATEUR CHOISIT PAYPAL - REDIRECTION DIRECTE VERS WHATSAPP
    if (payment === "PayPal") {
        // Construire le message WhatsApp
        const message = `🏖️ *NOUVELLE RÉSERVATION PAYPAL - VISIT BEJAIA* 🏖️

👤 *Client:* ${nom} ${prenom}
📧 *Email:* ${email}
📱 *Téléphone:* ${phone}

🎯 *Activité:* ${currentAct.name}
📅 *Date souhaitée:* ${date}
👥 *Personnes:* ${adults + children} (${adults} adultes${children > 0 ? `, ${children} enfants` : ''})

💰 *Montant total:* ${total.toLocaleString('fr-DZ')} DA
💵 *Acompte 30%:* ${deposit.toLocaleString('fr-DZ')} DA

💳 *Mode de paiement:* PAYPAL

📝 *Demandes spéciales:* ${special || 'Aucune'}

⏰ *Réservation faite le:* ${new Date().toLocaleString('fr-FR')}

🔔 *Action:* Client va effectuer le paiement PayPal. Veuillez confirmer la réservation.`;

        // Encoder le message pour URL WhatsApp
        const encodedMessage = encodeURIComponent(message);
        const whatsappNumber = "33619501708"; // Votre numéro
        
        // Rediriger vers WhatsApp
        window.location.href = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;
        
        // Fermer le modal
        closeModal();
        
        // Réinitialiser le formulaire
        document.getElementById("reservationForm").reset();
        document.getElementById("adults").value = 1;
        document.getElementById("children").value = 0;
        updateTotal();
        
        return; // Arrêter l'exécution ici
    }

    // POUR LES AUTRES MODES DE PAIEMENT (BaridiMob, CCP, Virement)
    setLoading(true);

    const payload = {
        nom: nom,
        prenom: prenom,
        email: email,
        telephone: phone,
        date_depart: date,
        nb_personnes: adults + children,
        nom_item: currentAct.name,
        type_reservation: "activite",
        prix_total: total,
        acompte_30pct: deposit,
        mode_paiement: payment,
        transaction_ref: transRef || null,
        demandes_speciales: special || null,
        status: "en_attente",
        paiement_statut: transRef ? "attente_validation" : "non_saisi"
    };

    try {
        const result = await sendReservation(payload);
        setLoading(false);
        
        if (result.success) {
            const message = result.local ? 
                "✅ Réservation sauvegardée localement" :
                "✅ Réservation confirmée !";
            showToast(`${message} - Total: ${total.toLocaleString('fr-DZ')} DA`, "success");
            
            setTimeout(() => {
                closeModal();
                document.getElementById("reservationForm").reset();
                document.getElementById("adults").value = 1;
                document.getElementById("children").value = 0;
                updateTotal();
            }, 2000);
        } else {
            showToast("❌ Erreur lors de la réservation", "error");
        }
    } catch (error) {
        console.error("Erreur:", error);
        setLoading(false);
        showToast("❌ Erreur: " + error.message, "error");
    }
});
